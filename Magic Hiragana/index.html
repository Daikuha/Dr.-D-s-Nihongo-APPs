<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Hiragana</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      margin: 0;
      background-color: #0f172a; 
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState, useEffect, useCallback, useMemo } = React;

    // --- Lucide Icon Component Helper ---
    const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
      const iconData = useMemo(() => {
        if (!window.lucide || !lucide.icons) return null;
        const key = name.charAt(0).toLowerCase() + name.slice(1);
        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
      }, [name]);

      if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill={fill}
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          dangerouslySetInnerHTML={{
            __html: iconData.map(([tag, attrs]) => {
              const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ");
              return `<${tag} ${attrStr} />`;
            }).join("")
          }}
        />
      );
    };

    // 空白セルを含めた五十音データ
    const HIRAGANA_DATA = [
      'あ', 'い', 'う', 'え', 'お',
      'か', 'き', 'く', 'け', 'こ',
      'さ', 'し', 'す', 'せ', 'そ',
      'た', 'ち', 'つ', 'て', 'と',
      'な', 'に', 'ぬ', 'ね', 'の',
      'は', 'ひ', 'ふ', 'へ', 'ほ',
      'ま', 'み', 'む', 'め', 'も',
      'や', '', 'ゆ', '', 'よ',
      'ら', 'り', 'る', 'れ', 'ろ',
      'わ', '', '', '', 'を',
      'ん', '', '', '', ''
    ];

    const VALID_KANAS = HIRAGANA_DATA.filter(k => k !== '');

    // 星を描画するヘルパー関数
    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      let step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;
        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    // 魔法のキラキラ音
    const playMagicSound = (audioCtx) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      const freq = 1200 + Math.random() * 2000;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    };

    // 塗りつぶし不足のエラー音
    const playErrorSound = (audioCtx) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    };

    function MagicHiraganaApp() {
      const [currentView, setCurrentView] = useState('start'); 
      const [userName, setUserName] = useState('');
      const [selectedKana, setSelectedKana] = useState('あ');
      const [completedChars, setCompletedChars] = useState(new Set());
      const [showPerfectChar, setShowPerfectChar] = useState(false);
      const [evalFeedback, setEvalFeedback] = useState(null); // 'fail', null
      const [hue, setHue] = useState(0);
      
      const containerRef = useRef(null);
      const lineCanvasRef = useRef(null);
      const effectCanvasRef = useRef(null);
      const bgCanvasRef = useRef(null); // 背景の薄いお手本用
      const referenceCanvasRef = useRef(null); // 見えない判定エリア用
      
      const audioCtxRef = useRef(null);
      const lastSoundTimeRef = useRef(0);
      
      const particlesRef = useRef([]);
      const rafRef = useRef(null);
      const isDrawing = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });

      const isAllCompleted = completedChars.size === VALID_KANAS.length;

      useEffect(() => {
        const blockDefault = (event) => {
          event.preventDefault();
        };

        const blockShortcut = (event) => {
          const key = event.key.toLowerCase();
          if ((event.ctrlKey || event.metaKey) && (key === 's' || key === 'c')) {
            event.preventDefault();
            event.stopPropagation();
          }
        };

        document.addEventListener('contextmenu', blockDefault, true);
        document.addEventListener('copy', blockDefault, true);
        window.addEventListener('keydown', blockShortcut, true);

        return () => {
          document.removeEventListener('contextmenu', blockDefault, true);
          document.removeEventListener('copy', blockDefault, true);
          window.removeEventListener('keydown', blockShortcut, true);
        };
      }, []);

      useEffect(() => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
          };
        }
      }, []);

      const playSound = useCallback((text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const msg = new SpeechSynthesisUtterance(text);
          msg.lang = 'ja-JP';
          msg.rate = 0.8;
          const voices = window.speechSynthesis.getVoices();
          const googleJaVoice = voices.find(v => v.lang.includes('ja') && v.name.toLowerCase().includes('google'));
          const anyJaVoice = voices.find(v => v.lang.includes('ja'));

          if (googleJaVoice) msg.voice = googleJaVoice;
          else if (anyJaVoice) msg.voice = anyJaVoice;

          window.speechSynthesis.speak(msg);
        }
      }, []);

      // ユーザーの描画だけを消去する
      const clearCanvas = useCallback(() => {
        const lineCanvas = lineCanvasRef.current;
        if (lineCanvas) {
          const lineCtx = lineCanvas.getContext('2d');
          lineCtx.save();
          lineCtx.setTransform(1, 0, 0, 1, 0, 0);
          lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
          lineCtx.restore();
        }
        particlesRef.current = [];
      }, []);

      // 背景の薄い文字と、判定用の極太文字（見えない）を描画する
      const drawBackgroundAndReference = useCallback(() => {
        const bgCanvas = bgCanvasRef.current;
        const refCanvas = referenceCanvasRef.current;
        const container = containerRef.current;
        if (!bgCanvas || !refCanvas || !container) return;

        const { width, height } = container.getBoundingClientRect();
        
        const bgCtx = bgCanvas.getContext('2d');
        const refCtx = refCanvas.getContext('2d', { willReadFrequently: true });

        bgCtx.save();
        bgCtx.setTransform(1, 0, 0, 1, 0, 0);
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.restore();

        refCtx.save();
        refCtx.setTransform(1, 0, 0, 1, 0, 0);
        refCtx.clearRect(0, 0, refCanvas.width, refCanvas.height);
        refCtx.restore();

        const fontSize = height * 0.7; // コンテナの70%のサイズ
        const fontStr = `bold ${fontSize}px 'Klee One', 'UD Digi Kyokasho N-B', serif`;

        // 表示用（薄い）
        bgCtx.font = fontStr;
        bgCtx.textAlign = 'center';
        bgCtx.textBaseline = 'middle';
        bgCtx.fillStyle = 'rgba(51, 65, 85, 0.5)'; // text-slate-700 opacity-50
        bgCtx.fillText(selectedKana, width / 2, height / 2);

        // 判定用（見えない、極太）
        refCtx.font = fontStr;
        refCtx.textAlign = 'center';
        refCtx.textBaseline = 'middle';
        refCtx.fillStyle = '#000000';
        refCtx.strokeStyle = '#000000';
        refCtx.lineWidth = 60; // 判定エリアを広めに取る
        refCtx.lineJoin = 'round';
        refCtx.strokeText(selectedKana, width / 2, height / 2);
        refCtx.fillText(selectedKana, width / 2, height / 2);
      }, [selectedKana]);

      const resizeCanvas = useCallback(() => {
        if (currentView === 'draw' && containerRef.current && lineCanvasRef.current && effectCanvasRef.current && bgCanvasRef.current && referenceCanvasRef.current) {
          const { width, height } = containerRef.current.getBoundingClientRect();
          if (width === 0 || height === 0) return; 
          
          const ratio = window.devicePixelRatio || 1;
          
          [lineCanvasRef.current, effectCanvasRef.current, bgCanvasRef.current, referenceCanvasRef.current].forEach(canvas => {
            if (canvas.width === width * ratio && canvas.height === height * ratio) return;
            canvas.width = width * ratio;
            canvas.height = height * ratio;
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(ratio, ratio);
          });
          
          clearCanvas();
          drawBackgroundAndReference();
        }
      }, [currentView, clearCanvas, drawBackgroundAndReference]);

      useEffect(() => {
        if (currentView === 'draw') {
          const timer = setTimeout(resizeCanvas, 50); 
          window.addEventListener('resize', resizeCanvas);
          return () => {
            clearTimeout(timer);
            window.removeEventListener('resize', resizeCanvas);
          };
        }
      }, [currentView, resizeCanvas]);

      useEffect(() => {
        if (currentView === 'draw') {
            clearCanvas();
            setShowPerfectChar(false);
            setEvalFeedback(null);
            drawBackgroundAndReference();
        }
      }, [selectedKana, currentView, clearCanvas, drawBackgroundAndReference]);

      // --- ピクセル塗りつぶし判定ロジック ---
      const checkCompletion = useCallback(() => {
        const lineCanvas = lineCanvasRef.current;
        const refCanvas = referenceCanvasRef.current;
        if (!lineCanvas || !refCanvas) return false;

        const width = lineCanvas.width;
        const height = lineCanvas.height;

        const lineCtx = lineCanvas.getContext('2d', { willReadFrequently: true });
        const refCtx = refCanvas.getContext('2d', { willReadFrequently: true });

        const lineData = lineCtx.getImageData(0, 0, width, height).data;
        const refData = refCtx.getImageData(0, 0, width, height).data;

        let totalRefPixels = 0;
        let coveredPixels = 0;

        // 4バイト(R,G,B,A)ごとのループで、アルファ値(透明度)をチェック
        for (let i = 3; i < refData.length; i += 4) {
          if (refData[i] > 50) { // お手本のエリア内
            totalRefPixels++;
            if (lineData[i] > 50) { // ユーザーも色を塗っている
              coveredPixels++;
            }
          }
        }

        if (totalRefPixels === 0) return true;

        const coverage = coveredPixels / totalRefPixels;
        console.log(`Coverage: ${(coverage * 100).toFixed(1)}%`);

        // お手本の40%以上がなぞられていれば合格
        return coverage > 0.40; 
      }, []);

      const handleComplete = () => {
        if (showPerfectChar) return;

        const isOK = checkCompletion();
        
        if (isOK) {
          setShowPerfectChar(true);
          setCompletedChars(prev => {
            const newSet = new Set(prev);
            newSet.add(selectedKana);
            return newSet;
          });
          playSound(selectedKana);
          if (audioCtxRef.current) playMagicSound(audioCtxRef.current);
        } else {
          // 塗りつぶし不足の場合
          if (audioCtxRef.current) playErrorSound(audioCtxRef.current);
          setEvalFeedback('fail');
          setTimeout(() => setEvalFeedback(null), 1500);
        }
      };


      // --- アニメーションと描画イベント ---
      const updateParticles = useCallback(() => {
        if (currentView !== 'draw') return;
        
        const ctx = effectCanvasRef.current?.getContext('2d');
        const canvas = effectCanvasRef.current;
        if (!ctx || !canvas) {
            rafRef.current = requestAnimationFrame(updateParticles);
            return;
        }
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = particlesRef.current.length - 1; i >= 0; i--) {
          const p = particlesRef.current[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.03;
          p.size *= 0.96;
          
          if (p.life <= 0) {
            particlesRef.current.splice(i, 1);
            continue;
          }
          drawStar(ctx, p.x, p.y, 5, p.size, p.size / 2.5, `hsla(${p.hue}, 100%, 70%, ${p.life})`);
        }
        rafRef.current = requestAnimationFrame(updateParticles);
      }, [currentView]);

      useEffect(() => {
        if (currentView === 'draw') {
          rafRef.current = requestAnimationFrame(updateParticles);
        }
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, [currentView, updateParticles]);

      const getPos = (e) => {
        const rect = effectCanvasRef.current.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      };

      const startDrawing = (e) => {
        if (e.cancelable) e.preventDefault();
        if (showPerfectChar) return; 

        if (!audioCtxRef.current) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtxRef.current = new AudioContext();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
        isDrawing.current = true;
        lastPos.current = getPos(e);
      };

      const draw = (e) => {
        if (e.cancelable) e.preventDefault();
        if (!isDrawing.current || showPerfectChar) return;
        
        const pos = getPos(e);
        const lineCtx = lineCanvasRef.current.getContext('2d', { willReadFrequently: true });
        
        lineCtx.beginPath();
        lineCtx.moveTo(lastPos.current.x, lastPos.current.y);
        lineCtx.lineTo(pos.x, pos.y);
        lineCtx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
        lineCtx.lineWidth = 35; // 少し太めにして塗りやすく
        lineCtx.lineCap = 'round';
        lineCtx.lineJoin = 'round';
        lineCtx.shadowBlur = 10;
        lineCtx.shadowColor = `hsl(${hue}, 100%, 50%)`;
        lineCtx.stroke();
        
        for(let i = 0; i < 2; i++) {
            particlesRef.current.push({
            x: pos.x + (Math.random() - 0.5) * 30,
            y: pos.y + (Math.random() - 0.5) * 30,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5 - 2,
            life: 1,
            size: Math.random() * 15 + 10,
            hue: hue + Math.random() * 40
            });
        }

        const now = Date.now();
        if (now - lastSoundTimeRef.current > 80) {
            playMagicSound(audioCtxRef.current);
            lastSoundTimeRef.current = now;
        }

        setHue((h) => (h + 3) % 360);
        lastPos.current = pos;
      };

      const stopDrawing = () => {
        isDrawing.current = false;
      };

      const changeChar = (direction) => {
        const currentIndex = VALID_KANAS.indexOf(selectedKana);
        const nextIndex = (currentIndex + direction + VALID_KANAS.length) % VALID_KANAS.length;
        setSelectedKana(VALID_KANAS[nextIndex]);
      };

      // --- 証明書ダウンロード ---
      const downloadCertificate = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 800;
        canvas.height = 600;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#fde047';
        ctx.lineWidth = 10;
        ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
        ctx.strokeStyle = '#ec4899';
        ctx.lineWidth = 4;
        ctx.strokeRect(36, 36, canvas.width - 72, canvas.height - 72);

        drawStar(ctx, 100, 100, 5, 30, 12, '#fde047');
        drawStar(ctx, 700, 100, 5, 30, 12, '#fde047');
        drawStar(ctx, 100, 500, 5, 30, 12, '#fde047');
        drawStar(ctx, 700, 500, 5, 30, 12, '#fde047');

        ctx.fillStyle = '#fde047';
        ctx.font = 'bold 50px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Certificate of Completion', canvas.width / 2, 140);

        ctx.fillStyle = '#cbd5e1';
        ctx.font = '30px sans-serif';
        ctx.fillText('This is to certify that', canvas.width / 2, 230);

        ctx.fillStyle = '#fb7185';
        ctx.font = 'bold 60px sans-serif';
        ctx.fillText(userName || 'Student', canvas.width / 2, 320);

        ctx.fillStyle = '#cbd5e1';
        ctx.font = '30px sans-serif';
        ctx.fillText('has successfully mastered all characters in', canvas.width / 2, 410);
        
        ctx.fillStyle = '#f472b6';
        ctx.font = 'bold 45px sans-serif';
        ctx.fillText('Magic Hiragana!', canvas.width / 2, 470);

        const date = new Date().toLocaleDateString();
        ctx.fillStyle = '#64748b';
        ctx.font = '24px sans-serif';
        ctx.fillText(`Date: ${date}`, canvas.width / 2, 540);

        const url = canvas.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = url;
        a.download = `${userName || 'Student'}_MagicHiragana_Certificate.png`;
        a.click();
      };


      // --- UI Components ---
      const renderStartView = () => (
        <div className="flex flex-col items-center justify-center w-full max-w-md mx-auto animate-in fade-in zoom-in duration-500 mt-8">
          <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border-2 border-pink-500/50 w-full text-center">
            <div className="flex items-center justify-center gap-2 text-yellow-300 mb-6">
              <Icon name="Wand2" size={28} className="animate-pulse" />
              <h1 className="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-pink-400">
                Magic Hiragana
              </h1>
              <Icon name="Sparkles" size={28} className="animate-pulse" />
            </div>

            <div className="text-slate-300 mb-8 text-left space-y-4 bg-slate-900/50 p-4 rounded-xl text-sm border border-slate-700">
              <h2 className="font-bold flex items-center gap-2 text-pink-300"><Icon name="BookOpen" size={18}/> How to use:</h2>
              <ul className="list-disc list-inside space-y-2">
                <li>Select a character from the list.</li>
                <li>Trace the character with your magic wand (finger/mouse).</li>
                <li>Click <b>Complete</b> to check if you traced it enough!</li>
                <li>Master all characters to earn your certificate!</li>
              </ul>
            </div>

            <div className="flex flex-col gap-4">
              <input 
                type="text" 
                placeholder="Enter your name" 
                value={userName}
                onChange={(e) => setUserName(e.target.value)}
                className="w-full text-center text-lg p-3 bg-slate-900 text-white border-2 border-slate-600 rounded-xl focus:outline-none focus:border-pink-500 transition shadow-inner placeholder-slate-500"
              />
              <button 
                onClick={() => setCurrentView('select')}
                disabled={!userName.trim()}
                className={`flex items-center justify-center gap-2 font-bold py-3 px-6 rounded-xl shadow-lg transform transition text-lg
                  ${!userName.trim() 
                    ? 'bg-slate-700 text-slate-500 cursor-not-allowed' 
                    : 'bg-pink-500 hover:bg-pink-400 text-white active:scale-95 shadow-[0_0_15px_rgba(236,72,153,0.5)]'
                  }`}
              >
                <Icon name="Play" size={24} /> Start Learning
              </button>
            </div>
          </div>
        </div>
      );

      const renderSelectView = () => (
        <div className="flex flex-col items-center w-full max-w-2xl mx-auto animate-in fade-in duration-500 mt-8 px-4">
          <div className="flex justify-between w-full items-center mb-6">
            <p className="text-slate-300 text-lg font-medium">Hello, <span className="text-pink-400 font-bold">{userName}</span>! Select a character:</p>
            <div className="text-sm bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-slate-700">
              {completedChars.size} / {VALID_KANAS.length}
            </div>
          </div>
          
          <div className="bg-slate-800 p-4 md:p-6 rounded-3xl shadow-xl border border-slate-700 w-full mb-8">
            <div className="grid grid-cols-5 gap-2 md:gap-4">
              {HIRAGANA_DATA.map((kana, index) => {
                if (!kana) return <div key={index} className="aspect-square"></div>;
                
                const isCompleted = completedChars.has(kana);
                return (
                  <button
                    key={index}
                    onClick={() => { setSelectedKana(kana); setCurrentView('draw'); }}
                    className={`aspect-square flex flex-col items-center justify-center rounded-xl md:rounded-2xl text-2xl md:text-4xl font-bold transition transform active:scale-90 shadow-sm relative overflow-hidden kyokasho-font
                      ${isCompleted 
                        ? 'bg-emerald-900/40 text-emerald-400 border-2 border-emerald-500/50 hover:bg-emerald-800/60' 
                        : 'bg-slate-700 text-slate-200 hover:bg-slate-600 hover:text-white border-2 border-transparent'
                      }
                    `}
                  >
                    {kana}
                    {isCompleted && (
                      <div className="absolute top-1 right-1">
                        <Icon name="CheckCircle2" size={16} className="text-emerald-500" />
                      </div>
                    )}
                  </button>
                );
              })}
            </div>
          </div>

          {isAllCompleted && (
            <button
              onClick={() => setCurrentView('certificate')}
              className="flex items-center justify-center gap-2 bg-gradient-to-r from-yellow-400 to-yellow-600 hover:from-yellow-300 hover:to-yellow-500 text-slate-900 text-xl font-bold py-4 px-8 rounded-full shadow-[0_0_30px_rgba(250,204,21,0.5)] transform transition active:scale-95 animate-bounce mb-8"
            >
              <Icon name="Award" size={28} />
              Get Certificate!
            </button>
          )}
        </div>
      );

      const renderDrawView = () => (
        <div className="flex flex-col items-center w-full max-w-md mx-auto animate-in zoom-in duration-300 px-4">
          
          <div className="flex items-center justify-between w-full mb-6 mt-4">
            <button 
              onClick={() => setCurrentView('select')}
              className="flex items-center gap-2 text-slate-400 hover:text-white transition font-medium bg-slate-800 py-2 px-4 rounded-full border border-slate-700 shadow-sm"
            >
              <Icon name="ArrowLeft" size={20} /> List
            </button>
            <button 
              onClick={clearCanvas}
              className="flex items-center gap-2 text-pink-400 hover:text-pink-300 transition font-medium bg-slate-800 py-2 px-4 rounded-full border border-slate-700 shadow-sm"
            >
              <Icon name="Trash2" size={20} /> Clear
            </button>
          </div>

          {/* キャンバスコンテナ */}
          <div 
            ref={containerRef}
            className={`relative w-full aspect-square bg-slate-800 rounded-3xl border-4 shadow-[0_0_40px_rgba(236,72,153,0.3)] overflow-hidden transition-colors duration-300 
              ${evalFeedback === 'fail' ? 'border-red-500 animate-shake shadow-[0_0_40px_rgba(239,68,68,0.5)]' : 'border-slate-700'}`}
            style={{ touchAction: 'none' }}
          >
            {/* 1. 背景のお手本用（薄い文字） */}
            <canvas ref={bgCanvasRef} className="absolute inset-0 z-0 pointer-events-none" />
            
            {/* 2. ピクセル判定用（見えない極太文字） */}
            <canvas ref={referenceCanvasRef} className="hidden" />

            {/* 3. なぞった軌跡 */}
            <canvas ref={lineCanvasRef} className="absolute inset-0 z-10 pointer-events-none" />

            {/* 4. キラキラエフェクト＆入力受け付け */}
            <canvas
              ref={effectCanvasRef}
              className={`absolute inset-0 z-20 ${showPerfectChar ? 'pointer-events-none' : 'cursor-crosshair'}`}
              onMouseDown={startDrawing}
              onMouseMove={draw}
              onMouseUp={stopDrawing}
              onMouseOut={stopDrawing}
              onTouchStart={startDrawing}
              onTouchMove={draw}
              onTouchEnd={stopDrawing}
              onTouchCancel={stopDrawing}
            />

            {/* なぞり不足のエラー表示 */}
            {evalFeedback === 'fail' && (
              <div className="absolute inset-0 flex items-center justify-center z-40 pointer-events-none">
                <div className="bg-red-500/90 text-white px-6 py-3 rounded-full font-bold text-xl shadow-2xl flex items-center gap-2 animate-in zoom-in duration-200">
                  <Icon name="X" size={28} /> Trace more!
                </div>
              </div>
            )}

            {/* Complete時の綺麗な文字オーバーレイ */}
            {showPerfectChar && (
              <div className="absolute inset-0 flex items-center justify-center z-30 pointer-events-none animate-in zoom-in duration-700">
                <span className="text-[250px] md:text-[300px] text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,1)] kyokasho-font font-bold">
                  {selectedKana}
                </span>
              </div>
            )}
          </div>

          <div className="flex items-center justify-between w-full mt-8 gap-4 pb-8">
            <button 
              onClick={() => changeChar(-1)}
              className="bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-full shadow-lg transition active:scale-95 flex-shrink-0"
            >
              <Icon name="ArrowLeft" size={28} />
            </button>
            
            <button 
              onClick={handleComplete}
              disabled={showPerfectChar}
              className={`flex-1 flex items-center justify-center gap-2 font-bold py-4 px-8 rounded-full shadow-[0_0_20px_rgba(34,197,94,0.3)] transition active:scale-95 text-xl
                ${showPerfectChar 
                  ? 'bg-emerald-600/50 text-emerald-200 cursor-not-allowed border border-emerald-500' 
                  : 'bg-emerald-500 hover:bg-emerald-400 text-white'
                }`}
            >
              <Icon name="Check" size={28} />
              {showPerfectChar ? 'Completed!' : 'Complete'}
            </button>

            <button 
              onClick={() => changeChar(1)}
              className="bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-full shadow-lg transition active:scale-95 flex-shrink-0"
            >
              <Icon name="ArrowRight" size={28} />
            </button>
          </div>
        </div>
      );

      const renderCertificateView = () => (
        <div className="flex flex-col items-center justify-center w-full h-full animate-in zoom-in duration-500 px-4">
          <div className="bg-slate-800 p-8 md:p-12 rounded-3xl shadow-[0_0_50px_rgba(250,204,21,0.2)] border-4 border-yellow-400 text-center max-w-2xl w-full relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full bg-slate-900 opacity-50 pointer-events-none"></div>
            <div className="relative z-10 flex flex-col items-center">
              <Icon name="Award" size={80} className="text-yellow-400 mb-6 drop-shadow-md animate-pulse" />
              <h2 className="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 mb-4 uppercase tracking-widest">
                Certificate
              </h2>
              <p className="text-slate-300 text-lg md:text-xl mb-6">This certifies that</p>
              <h3 className="text-4xl md:text-6xl font-bold text-pink-400 mb-6 border-b-2 border-slate-600 pb-2 px-8 break-all">
                {userName}
              </h3>
              <p className="text-slate-300 text-lg md:text-xl mb-2">has successfully mastered all characters in</p>
              <p className="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400 text-xl md:text-3xl font-bold mb-8">Magic Hiragana!</p>
              
              <div className="flex flex-col md:flex-row gap-4">
                <button 
                  onClick={downloadCertificate}
                  className="flex items-center justify-center gap-2 bg-pink-600 hover:bg-pink-500 text-white text-lg font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(236,72,153,0.5)] transform transition active:scale-95"
                >
                  <Icon name="Download" size={24} /> Download
                </button>
                <button 
                  onClick={() => setCurrentView('select')}
                  className="flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-white text-lg font-bold py-3 px-6 rounded-full shadow transition active:scale-95 border border-slate-600"
                >
                  <Icon name="ArrowLeft" size={24} /> Back to List
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center font-sans overflow-hidden">
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap');
            .kyokasho-font {
              font-family: 'Klee One', serif;
            }
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              20%, 60% { transform: translateX(-10px); }
              40%, 80% { transform: translateX(10px); }
            }
            .animate-shake { animation: shake 0.4s ease-in-out; }
          `}} />
          <div className="w-full flex-1 flex flex-col justify-center max-w-5xl mx-auto">
            {currentView === 'start' && renderStartView()}
            {currentView === 'select' && renderSelectView()}
            {currentView === 'draw' && renderDrawView()}
            {currentView === 'certificate' && renderCertificateView()}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicHiraganaApp />);
  </script>
</body>
</html>
