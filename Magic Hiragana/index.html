<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Hiragana</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      margin: 0;
      background-color: #0f172a; 
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState, useEffect, useCallback, useMemo } = React;

    // --- Lucide Icon Component Helper ---
    const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
      const iconData = useMemo(() => {
        if (!window.lucide || !lucide.icons) return null;
        const key = name.charAt(0).toLowerCase() + name.slice(1);
        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
      }, [name]);

      if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill={fill}
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          dangerouslySetInnerHTML={{
            __html: iconData.map(([tag, attrs]) => {
              const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ");
              return `<${tag} ${attrStr} />`;
            }).join("")
          }}
        />
      );
    };

    // 空白セルを含めた五十音データ
    const HIRAGANA_DATA = [
      'あ', 'い', 'う', 'え', 'お',
      'か', 'き', 'く', 'け', 'こ',
      'さ', 'し', 'す', 'せ', 'そ',
      'た', 'ち', 'つ', 'て', 'と',
      'な', 'に', 'ぬ', 'ね', 'の',
      'は', 'ひ', 'ふ', 'へ', 'ほ',
      'ま', 'み', 'む', 'め', 'も',
      'や', '', 'ゆ', '', 'よ',
      'ら', 'り', 'る', 'れ', 'ろ',
      'わ', '', '', '', 'を',
      'ん', '', '', '', ''
    ];

    const VALID_KANA_ITEMS = [
      { kana: 'あ', romaji: 'a' }, { kana: 'い', romaji: 'i' }, { kana: 'う', romaji: 'u' }, { kana: 'え', romaji: 'e' }, { kana: 'お', romaji: 'o' },
      { kana: 'か', romaji: 'ka' }, { kana: 'き', romaji: 'ki' }, { kana: 'く', romaji: 'ku' }, { kana: 'け', romaji: 'ke' }, { kana: 'こ', romaji: 'ko' },
      { kana: 'さ', romaji: 'sa' }, { kana: 'し', romaji: 'shi' }, { kana: 'す', romaji: 'su' }, { kana: 'せ', romaji: 'se' }, { kana: 'そ', romaji: 'so' },
      { kana: 'た', romaji: 'ta' }, { kana: 'ち', romaji: 'chi' }, { kana: 'つ', romaji: 'tsu' }, { kana: 'て', romaji: 'te' }, { kana: 'と', romaji: 'to' },
      { kana: 'な', romaji: 'na' }, { kana: 'に', romaji: 'ni' }, { kana: 'ぬ', romaji: 'nu' }, { kana: 'ね', romaji: 'ne' }, { kana: 'の', romaji: 'no' },
      { kana: 'は', romaji: 'ha' }, { kana: 'ひ', romaji: 'hi' }, { kana: 'ふ', romaji: 'fu' }, { kana: 'へ', romaji: 'he' }, { kana: 'ほ', romaji: 'ho' },
      { kana: 'ま', romaji: 'ma' }, { kana: 'み', romaji: 'mi' }, { kana: 'む', romaji: 'mu' }, { kana: 'め', romaji: 'me' }, { kana: 'も', romaji: 'mo' },
      { kana: 'や', romaji: 'ya' }, { kana: 'ゆ', romaji: 'yu' }, { kana: 'よ', romaji: 'yo' },
      { kana: 'ら', romaji: 'ra' }, { kana: 'り', romaji: 'ri' }, { kana: 'る', romaji: 'ru' }, { kana: 'れ', romaji: 're' }, { kana: 'ろ', romaji: 'ro' },
      { kana: 'わ', romaji: 'wa' }, { kana: 'を', romaji: '(w)o' }, { kana: 'ん', romaji: 'n' }
    ];

    const VALID_KANAS = VALID_KANA_ITEMS.map(item => item.kana);

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const TTS_SMALL_VOWEL_GROUPS = [
      { chars: 'あかさたなはまやらわ', suffix: 'ぁ' },
      { chars: 'いきしちにひみり', suffix: 'ぃ' },
      { chars: 'うくすつぬふむゆる', suffix: 'ぅ' },
      { chars: 'えけせてねへめれ', suffix: 'ぇ' },
      { chars: 'おこそとのほもよろを', suffix: 'ぉ' }
    ];

    const getKanaTtsReading = (kana) => {
      if (!kana || kana.length > 1) return kana;

      const group = TTS_SMALL_VOWEL_GROUPS.find(({ chars }) => chars.includes(kana));
      return group ? `${kana}${group.suffix}` : kana;
    };

    // 星を描画するヘルパー関数
    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      let step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;
        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    // 魔法のキラキラ音
    const playMagicSound = (audioCtx) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      const freq = 1200 + Math.random() * 2000;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    };

    // 塗りつぶし不足のエラー音
    const playErrorSound = (audioCtx) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    };

    function MagicHiraganaApp() {
      const [currentView, setCurrentView] = useState('start'); 
      const [currentMode, setCurrentMode] = useState('learning');
      const [userName, setUserName] = useState('');
      const [selectedKana, setSelectedKana] = useState('あ');
      const [completedChars, setCompletedChars] = useState(new Set());
      const [showPerfectChar, setShowPerfectChar] = useState(false);
      const [evalFeedback, setEvalFeedback] = useState(null); // 'fail', null
      const [hue, setHue] = useState(0);
      const [gameTimeLeft, setGameTimeLeft] = useState(120);
      const [gameScore, setGameScore] = useState(0);
      const [gameAnsweredCount, setGameAnsweredCount] = useState(0);
      const [gameCurrentItem, setGameCurrentItem] = useState(VALID_KANA_ITEMS[0]);
      const [gameOptions, setGameOptions] = useState([]);
      const [gamePhase, setGamePhase] = useState('writing'); // 'writing', 'choice', 'feedback'
      const [gameRomajiFeedback, setGameRomajiFeedback] = useState(null);
      const [selectedGameOption, setSelectedGameOption] = useState(null);
      
      const containerRef = useRef(null);
      const lineCanvasRef = useRef(null);
      const effectCanvasRef = useRef(null);
      const bgCanvasRef = useRef(null); // 背景の薄いお手本用
      const referenceCanvasRef = useRef(null); // 見えない判定エリア用
      
      const audioCtxRef = useRef(null);
      const lastSoundTimeRef = useRef(0);
      
      const particlesRef = useRef([]);
      const rafRef = useRef(null);
      const isDrawing = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });
      const gameRoundTimeoutRef = useRef(null);

      const isAllCompleted = completedChars.size === VALID_KANAS.length;
      const isCanvasView = currentView === 'draw' || currentView === 'game';
      const activeCanvasKana = currentView === 'game' ? (gameCurrentItem?.kana || '') : selectedKana;
      const isCanvasLocked = currentView === 'draw' ? showPerfectChar : gamePhase !== 'writing';

      useEffect(() => {
        const blockDefault = (event) => {
          event.preventDefault();
        };

        const blockShortcut = (event) => {
          const key = event.key.toLowerCase();
          if ((event.ctrlKey || event.metaKey) && (key === 's' || key === 'c')) {
            event.preventDefault();
            event.stopPropagation();
          }
        };

        document.addEventListener('contextmenu', blockDefault, true);
        document.addEventListener('copy', blockDefault, true);
        window.addEventListener('keydown', blockShortcut, true);

        return () => {
          document.removeEventListener('contextmenu', blockDefault, true);
          document.removeEventListener('copy', blockDefault, true);
          window.removeEventListener('keydown', blockShortcut, true);
        };
      }, []);

      useEffect(() => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
          };
        }
      }, []);

      const playSound = useCallback((text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const msg = new SpeechSynthesisUtterance(getKanaTtsReading(text));
          msg.lang = 'ja-JP';
          msg.rate = 0.8;
          const voices = window.speechSynthesis.getVoices();
          const googleJaVoice = voices.find(v => v.lang.includes('ja') && v.name.toLowerCase().includes('google'));
          const anyJaVoice = voices.find(v => v.lang.includes('ja'));

          if (googleJaVoice) msg.voice = googleJaVoice;
          else if (anyJaVoice) msg.voice = anyJaVoice;

          window.speechSynthesis.speak(msg);
        }
      }, []);

      // ユーザーの描画だけを消去する
      const clearCanvas = useCallback(() => {
        const lineCanvas = lineCanvasRef.current;
        if (lineCanvas) {
          const lineCtx = lineCanvas.getContext('2d');
          lineCtx.save();
          lineCtx.setTransform(1, 0, 0, 1, 0, 0);
          lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
          lineCtx.restore();
        }
        particlesRef.current = [];
      }, []);

      const buildGameOptions = useCallback((correctItem) => {
        const wrongOptions = shuffleArray(
          VALID_KANA_ITEMS.filter(item => item.kana !== correctItem.kana)
        ).slice(0, 3);

        return shuffleArray([
          { romaji: correctItem.romaji, isCorrect: true },
          ...wrongOptions.map(item => ({ romaji: item.romaji, isCorrect: false }))
        ]);
      }, []);

      const prepareNextGameRound = useCallback(() => {
        const nextItem = VALID_KANA_ITEMS[Math.floor(Math.random() * VALID_KANA_ITEMS.length)];
        setGameCurrentItem(nextItem);
        setGameOptions(buildGameOptions(nextItem));
        setGamePhase('writing');
        setGameRomajiFeedback(null);
        setSelectedGameOption(null);
        setEvalFeedback(null);
        clearCanvas();
      }, [buildGameOptions, clearCanvas]);

      const startGameMode = useCallback(() => {
        if (gameRoundTimeoutRef.current) clearTimeout(gameRoundTimeoutRef.current);
        setCurrentMode('game');
        setCurrentView('game');
        setGameTimeLeft(120);
        setGameScore(0);
        setGameAnsweredCount(0);
        prepareNextGameRound();
      }, [prepareNextGameRound]);

      const returnHome = useCallback(() => {
        if (gameRoundTimeoutRef.current) clearTimeout(gameRoundTimeoutRef.current);
        setCurrentMode('learning');
        setCurrentView('start');
        setGamePhase('writing');
        setGameRomajiFeedback(null);
        setSelectedGameOption(null);
        setEvalFeedback(null);
      }, []);

      // 背景の薄い文字と、判定用の極太文字（見えない）を描画する
      const drawBackgroundAndReference = useCallback(() => {
        const bgCanvas = bgCanvasRef.current;
        const refCanvas = referenceCanvasRef.current;
        const container = containerRef.current;
        if (!bgCanvas || !refCanvas || !container) return;

        const { width, height } = container.getBoundingClientRect();
        
        const bgCtx = bgCanvas.getContext('2d');
        const refCtx = refCanvas.getContext('2d', { willReadFrequently: true });

        bgCtx.save();
        bgCtx.setTransform(1, 0, 0, 1, 0, 0);
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.restore();

        refCtx.save();
        refCtx.setTransform(1, 0, 0, 1, 0, 0);
        refCtx.clearRect(0, 0, refCanvas.width, refCanvas.height);
        refCtx.restore();

        const fontSize = height * 0.7; // コンテナの70%のサイズ
        const fontStr = `bold ${fontSize}px 'Klee One', 'UD Digi Kyokasho N-B', serif`;

        // 表示用（薄い）
        bgCtx.font = fontStr;
        bgCtx.textAlign = 'center';
        bgCtx.textBaseline = 'middle';
        bgCtx.fillStyle = 'rgba(51, 65, 85, 0.5)'; // text-slate-700 opacity-50
        bgCtx.fillText(activeCanvasKana, width / 2, height / 2);

        // 判定用（見えない、極太）
        refCtx.font = fontStr;
        refCtx.textAlign = 'center';
        refCtx.textBaseline = 'middle';
        refCtx.fillStyle = '#000000';
        refCtx.strokeStyle = '#000000';
        refCtx.lineWidth = 60; // 判定エリアを広めに取る
        refCtx.lineJoin = 'round';
        refCtx.strokeText(activeCanvasKana, width / 2, height / 2);
        refCtx.fillText(activeCanvasKana, width / 2, height / 2);
      }, [activeCanvasKana]);

      const resizeCanvas = useCallback(() => {
        if (isCanvasView && containerRef.current && lineCanvasRef.current && effectCanvasRef.current && bgCanvasRef.current && referenceCanvasRef.current) {
          const { width, height } = containerRef.current.getBoundingClientRect();
          if (width === 0 || height === 0) return; 
          
          const ratio = window.devicePixelRatio || 1;
          
          [lineCanvasRef.current, effectCanvasRef.current, bgCanvasRef.current, referenceCanvasRef.current].forEach(canvas => {
            if (canvas.width === width * ratio && canvas.height === height * ratio) return;
            canvas.width = width * ratio;
            canvas.height = height * ratio;
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(ratio, ratio);
          });
          
          clearCanvas();
          drawBackgroundAndReference();
        }
      }, [isCanvasView, clearCanvas, drawBackgroundAndReference]);

      useEffect(() => {
        if (isCanvasView) {
          const timer = setTimeout(resizeCanvas, 50); 
          window.addEventListener('resize', resizeCanvas);
          return () => {
            clearTimeout(timer);
            window.removeEventListener('resize', resizeCanvas);
          };
        }
      }, [isCanvasView, resizeCanvas]);

      useEffect(() => {
        if (isCanvasView) {
            clearCanvas();
            setEvalFeedback(null);
            if (currentView === 'draw') setShowPerfectChar(false);
            drawBackgroundAndReference();
        }
      }, [activeCanvasKana, currentView, isCanvasView, clearCanvas, drawBackgroundAndReference]);

      useEffect(() => {
        if (currentView !== 'game') {
          if (gameRoundTimeoutRef.current) {
            clearTimeout(gameRoundTimeoutRef.current);
            gameRoundTimeoutRef.current = null;
          }
          return;
        }

        const timer = setInterval(() => {
          setGameTimeLeft(prev => {
            if (prev <= 1) {
              if (gameRoundTimeoutRef.current) {
                clearTimeout(gameRoundTimeoutRef.current);
                gameRoundTimeoutRef.current = null;
              }
              setCurrentView('gameResult');
              return 0;
            }
            return prev - 1;
          });
        }, 1000);

        return () => clearInterval(timer);
      }, [currentView]);

      // --- ピクセル塗りつぶし判定ロジック ---
      const checkCompletion = useCallback(() => {
        const lineCanvas = lineCanvasRef.current;
        const refCanvas = referenceCanvasRef.current;
        if (!lineCanvas || !refCanvas) return false;

        const width = lineCanvas.width;
        const height = lineCanvas.height;

        const lineCtx = lineCanvas.getContext('2d', { willReadFrequently: true });
        const refCtx = refCanvas.getContext('2d', { willReadFrequently: true });

        const lineData = lineCtx.getImageData(0, 0, width, height).data;
        const refData = refCtx.getImageData(0, 0, width, height).data;

        let totalRefPixels = 0;
        let coveredPixels = 0;

        // 4バイト(R,G,B,A)ごとのループで、アルファ値(透明度)をチェック
        for (let i = 3; i < refData.length; i += 4) {
          if (refData[i] > 50) { // お手本のエリア内
            totalRefPixels++;
            if (lineData[i] > 50) { // ユーザーも色を塗っている
              coveredPixels++;
            }
          }
        }

        if (totalRefPixels === 0) return true;

        const coverage = coveredPixels / totalRefPixels;
        console.log(`Coverage: ${(coverage * 100).toFixed(1)}%`);

        // お手本の40%以上がなぞられていれば合格
        return coverage > 0.40; 
      }, []);

      const handleLearningComplete = () => {
        if (showPerfectChar) return;

        const isOK = checkCompletion();
        
        if (isOK) {
          setShowPerfectChar(true);
          setCompletedChars(prev => {
            const newSet = new Set(prev);
            newSet.add(selectedKana);
            return newSet;
          });
          playSound(selectedKana);
          if (audioCtxRef.current) playMagicSound(audioCtxRef.current);
        } else {
          // 塗りつぶし不足の場合
          if (audioCtxRef.current) playErrorSound(audioCtxRef.current);
          setEvalFeedback('fail');
          setTimeout(() => setEvalFeedback(null), 1500);
        }
      };

      const handleGameComplete = () => {
        if (gamePhase !== 'writing') return;

        const isOK = checkCompletion();

        if (isOK) {
          if (audioCtxRef.current) playMagicSound(audioCtxRef.current);
          setGamePhase('choice');
          setEvalFeedback(null);
        } else {
          if (audioCtxRef.current) playErrorSound(audioCtxRef.current);
          setEvalFeedback('fail');
          setTimeout(() => setEvalFeedback(null), 1500);
        }
      };

      const handleGameOptionSelect = (option) => {
        if (gamePhase !== 'choice') return;

        const isCorrect = option.isCorrect;
        setSelectedGameOption(option.romaji);
        setGameRomajiFeedback(isCorrect ? 'correct' : 'incorrect');
        setGameAnsweredCount(prev => prev + 1);
        setGamePhase('feedback');

        if (isCorrect) {
          setGameScore(prev => prev + 1);
          if (audioCtxRef.current) playMagicSound(audioCtxRef.current);
        } else if (audioCtxRef.current) {
          playErrorSound(audioCtxRef.current);
        }

        playSound(gameCurrentItem.kana);

        if (gameRoundTimeoutRef.current) clearTimeout(gameRoundTimeoutRef.current);
        gameRoundTimeoutRef.current = setTimeout(() => {
          prepareNextGameRound();
        }, 1000);
      };


      // --- アニメーションと描画イベント ---
      const updateParticles = useCallback(() => {
        if (!isCanvasView) return;
        
        const ctx = effectCanvasRef.current?.getContext('2d');
        const canvas = effectCanvasRef.current;
        if (!ctx || !canvas) {
            rafRef.current = requestAnimationFrame(updateParticles);
            return;
        }
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = particlesRef.current.length - 1; i >= 0; i--) {
          const p = particlesRef.current[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.03;
          p.size *= 0.96;
          
          if (p.life <= 0) {
            particlesRef.current.splice(i, 1);
            continue;
          }
          drawStar(ctx, p.x, p.y, 5, p.size, p.size / 2.5, `hsla(${p.hue}, 100%, 70%, ${p.life})`);
        }
        rafRef.current = requestAnimationFrame(updateParticles);
      }, [isCanvasView]);

      useEffect(() => {
        if (isCanvasView) {
          rafRef.current = requestAnimationFrame(updateParticles);
        }
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, [isCanvasView, updateParticles]);

      const getPos = (e) => {
        const rect = effectCanvasRef.current.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      };

      const startDrawing = (e) => {
        if (e.cancelable) e.preventDefault();
        if (isCanvasLocked) return; 

        if (!audioCtxRef.current) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtxRef.current = new AudioContext();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
        isDrawing.current = true;
        lastPos.current = getPos(e);
      };

      const draw = (e) => {
        if (e.cancelable) e.preventDefault();
        if (!isDrawing.current || isCanvasLocked) return;
        
        const pos = getPos(e);
        const lineCtx = lineCanvasRef.current.getContext('2d', { willReadFrequently: true });
        
        lineCtx.beginPath();
        lineCtx.moveTo(lastPos.current.x, lastPos.current.y);
        lineCtx.lineTo(pos.x, pos.y);
        lineCtx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
        lineCtx.lineWidth = 35; // 少し太めにして塗りやすく
        lineCtx.lineCap = 'round';
        lineCtx.lineJoin = 'round';
        lineCtx.shadowBlur = 10;
        lineCtx.shadowColor = `hsl(${hue}, 100%, 50%)`;
        lineCtx.stroke();
        
        for(let i = 0; i < 2; i++) {
            particlesRef.current.push({
            x: pos.x + (Math.random() - 0.5) * 30,
            y: pos.y + (Math.random() - 0.5) * 30,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5 - 2,
            life: 1,
            size: Math.random() * 15 + 10,
            hue: hue + Math.random() * 40
            });
        }

        const now = Date.now();
        if (now - lastSoundTimeRef.current > 80) {
            playMagicSound(audioCtxRef.current);
            lastSoundTimeRef.current = now;
        }

        setHue((h) => (h + 3) % 360);
        lastPos.current = pos;
      };

      const stopDrawing = () => {
        isDrawing.current = false;
      };

      const changeChar = (direction) => {
        const currentIndex = VALID_KANAS.indexOf(selectedKana);

                </div>

                <div className="w-full max-w-md mb-8 bg-slate-900/70 p-4 rounded-2xl border border-slate-700">
                  <label className="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wider">Player Name For Certificate</label>
                  <input
                    type="text"
                    maxLength="20"
                    placeholder="Enter your name"
                    value={userName}
                    onChange={(e) => setUserName(e.target.value)}
                    className="w-full text-center text-2xl md:text-4xl font-bold text-cyan-300 bg-transparent border-none focus:outline-none placeholder-slate-500"
                  />
                </div>

                <div className="flex flex-col md:flex-row gap-4">
                  <button
                    onClick={downloadGameCertificate}
                    className="flex items-center justify-center gap-2 bg-pink-600 hover:bg-pink-500 text-white text-lg font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(236,72,153,0.5)] transform transition active:scale-95"
                  >
                    <Icon name="Download" size={24} /> Game Certificate
                  </button>
                  <button
                    onClick={startGameMode}
                    className="flex items-center justify-center gap-2 bg-cyan-500 hover:bg-cyan-400 text-slate-950 text-lg font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(34,211,238,0.5)] transform transition active:scale-95"
                  >
                    <Icon name="RotateCcw" size={24} /> Play Again
                  </button>
                  <button
                    onClick={returnHome}
                    className="flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-white text-lg font-bold py-3 px-6 rounded-full shadow transition active:scale-95 border border-slate-600"
                  >
                    <Icon name="Home" size={24} /> Home
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const renderCertificateView = () => (
        <div className="flex flex-col items-center justify-center w-full h-full animate-in zoom-in duration-500 px-4">
          <div className="bg-slate-800 p-8 md:p-12 rounded-3xl shadow-[0_0_50px_rgba(250,204,21,0.2)] border-4 border-yellow-400 text-center max-w-2xl w-full relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full bg-slate-900 opacity-50 pointer-events-none"></div>
            <div className="relative z-10 flex flex-col items-center">
              <Icon name="Award" size={80} className="text-yellow-400 mb-6 drop-shadow-md animate-pulse" />
              <h2 className="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 mb-4 uppercase tracking-widest">
                Certificate
              </h2>
              <p className="text-slate-300 text-lg md:text-xl mb-6">This certifies that</p>
              <div className="w-full max-w-md mb-6 bg-slate-900/70 p-4 rounded-2xl border border-slate-700">
                <label className="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wider">Student Name</label>
                <input
                  type="text"
                  maxLength="20"
                  placeholder="Enter your name"
                  value={userName}
                  onChange={(e) => setUserName(e.target.value)}
                  className="w-full text-center text-3xl md:text-5xl font-bold text-pink-400 bg-transparent border-none focus:outline-none placeholder-slate-500"
                />
              </div>
              <p className="text-slate-300 text-lg md:text-xl mb-2">has successfully mastered all characters in</p>
              <p className="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400 text-xl md:text-3xl font-bold mb-8">Magic Hiragana!</p>
              
              <div className="flex flex-col md:flex-row gap-4">
                <button 
                  onClick={downloadCertificate}
                  className="flex items-center justify-center gap-2 bg-pink-600 hover:bg-pink-500 text-white text-lg font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(236,72,153,0.5)] transform transition active:scale-95"
                >
                  <Icon name="Download" size={24} /> Download
                </button>
                <button 
                  onClick={() => setCurrentView('select')}
                  className="flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-white text-lg font-bold py-3 px-6 rounded-full shadow transition active:scale-95 border border-slate-600"
                >
                  <Icon name="ArrowLeft" size={24} /> Back to List
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center font-sans overflow-hidden">
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap');
            .kyokasho-font {
              font-family: 'Klee One', serif;
            }
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              20%, 60% { transform: translateX(-10px); }
              40%, 80% { transform: translateX(10px); }
            }
            .animate-shake { animation: shake 0.4s ease-in-out; }
          `}} />
          <div className="w-full flex-1 flex flex-col justify-center max-w-5xl mx-auto">
            {currentView === 'start' && renderStartView()}
            {currentView === 'select' && renderSelectView()}
            {currentView === 'draw' && renderDrawView()}
            {currentView === 'game' && renderGameView()}
            {currentView === 'gameResult' && renderGameResultView()}
            {currentView === 'certificate' && renderCertificateView()}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicHiraganaApp />);
  </script>
</body>
</html>
