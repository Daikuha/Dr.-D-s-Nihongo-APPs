<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Builder</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- SheetJS for Excel/CSV import -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- Lucide Icon Component Helper ---
    const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
      const iconData = useMemo(() => {
        if (!window.lucide || !lucide.icons) return null;
        const key = name.charAt(0).toLowerCase() + name.slice(1);
        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
      }, [name]);

      if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill={fill}
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          dangerouslySetInnerHTML={{
            __html: iconData.map(([tag, attrs]) => {
              const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ");
              return `<${tag} ${attrStr} />`;
            }).join("")
          }}
        />
      );
    };

    // --- 柔軟な判定のためのローマ字変換・正規化ロジック ---
    const KANA_TO_ROMAJI = {
      'あ':'a', 'い':'i', 'う':'u', 'え':'e', 'お':'o',
      'か':'ka', 'き':'ki', 'く':'ku', 'け':'ke', 'こ':'ko',
      'さ':'sa', 'し':'shi', 'す':'su', 'せ':'se', 'そ':'so',
      'た':'ta', 'ち':'chi', 'つ':'tsu', 'て':'te', 'と':'to',
      'な':'na', 'に':'ni', 'ぬ':'nu', 'ね':'ne', 'の':'no',
      'は':'ha', 'ひ':'hi', 'ふ':'fu', 'へ':'he', 'ほ':'ho',
      'ま':'ma', 'み':'mi', 'む':'mu', 'め':'me', 'も':'mo',
      'や':'ya', 'ゆ':'yu', 'よ':'yo',
      'ら':'ra', 'り':'ri', 'る':'ru', 'れ':'re', 'ろ':'ro',
      'わ':'wa', 'を':'o', 'ん':'n',
      'が':'ga', 'ぎ':'gi', 'ぐ':'gu', 'げ':'ge', 'ご':'go',
      'ざ':'za', 'じ':'ji', 'ず':'zu', 'ぜ':'ze', 'ぞ':'zo',
      'だ':'da', 'ぢ':'ji', 'づ':'zu', 'で':'de', 'ど':'do',
      'ば':'ba', 'び':'bi', 'ぶ':'bu', 'べ':'be', 'ぼ':'bo',
      'ぱ':'pa', 'ぴ':'pi', 'ぷ':'pu', 'ぺ':'pe', 'ぽ':'po',
      'きゃ':'kya', 'きゅ':'kyu', 'きょ':'kyo',
      'しゃ':'sha', 'しゅ':'shu', 'しょ':'sho',
      'ちゃ':'cha', 'ちゅ':'chu', 'ちょ':'cho',
      'にゃ':'nya', 'にゅ':'nyu', 'にょ':'nyo',
      'ひゃ':'hya', 'ひゅ':'hyu', 'ひょ':'hyo',
      'みゃ':'mya', 'みゅ':'myu', 'みょ':'myo',
      'りゃ':'rya', 'りゅ':'ryu', 'りょ':'ryo',
      'ぎゃ':'gya', 'ぎゅ':'gyu', 'ぎょ':'gyo',
      'じゃ':'ja', 'じゅ':'ju', 'じょ':'jo',
      'びゃ':'bya', 'びゅ':'byu', 'びょ':'byo',
      'ぴゃ':'pya', 'ぴゅ':'pyu', 'ぴょ':'pyo'
    };

    const katakanaToHiragana = (text) => text.replace(/[\u30a1-\u30f6]/g, (char) => (
      String.fromCharCode(char.charCodeAt(0) - 0x60)
    ));

    // どんな入力（ひらがな・カタカナ・全角英数）でも一旦半角ローマ字に変換する
    const toRomaji = (text) => {
      let str = text.replace(/[Ａ-Ｚａ-ｚ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
      str = katakanaToHiragana(str).toLowerCase().replace(/\s+/g, '');

      let romaji = '';
      let i = 0;
      while (i < str.length) {
        if (i < str.length - 1) {
          const twoChar = str.substring(i, i + 2);
          if (KANA_TO_ROMAJI[twoChar]) {
            romaji += KANA_TO_ROMAJI[twoChar];
            i += 2;
            continue;
          }
        }
        // 促音（っ）の処理
        if (str[i] === 'っ' && i < str.length - 1) {
          const nextChar = str.substring(i + 1, i + 2);
          const nextTwoChar = str.substring(i + 1, i + 3);
          let nextRomaji = KANA_TO_ROMAJI[nextTwoChar] || KANA_TO_ROMAJI[nextChar] || nextChar;
          if (nextRomaji && !['a', 'i', 'u', 'e', 'o'].includes(nextRomaji[0])) {
            romaji += nextRomaji[0];
            i++;
            continue;
          }
        }
        // 長音（ー）の処理
        if (str[i] === 'ー') {
          romaji += '-';
          i++;
          continue;
        }
        const oneChar = str[i];
        romaji += KANA_TO_ROMAJI[oneChar] || oneChar;
        i++;
      }
      return romaji;
    };

    // 綴りの揺らぎ（ヘボン式・訓令式・長音など）を吸収する正規化
    const normalizeRomaji = (romaji) => {
      return romaji
        .replace(/shi/g, 'si').replace(/chi/g, 'ti').replace(/tsu/g, 'tu').replace(/fu/g, 'hu').replace(/ji/g, 'zi')
        .replace(/sha/g, 'sya').replace(/shu/g, 'syu').replace(/sho/g, 'syo')
        .replace(/cha/g, 'tya').replace(/chu/g, 'tyu').replace(/cho/g, 'tyo')
        .replace(/ja/g, 'zya').replace(/ju/g, 'zyu').replace(/jo/g, 'zyo')
        .replace(/ou/g, 'o').replace(/oo/g, 'o').replace(/oh/g, 'o') // 長い「お」の揺らぎ吸収
        .replace(/uu/g, 'u') // 長い「う」の揺らぎ吸収
        .replace(/-/g, '') // ハイフン無視
        .replace(/nn/g, 'n'); // 「ん」のタイピング揺らぎ吸収
    };

    const normalizeString = (str) => str.toLowerCase().replace(/\s+/g, '');

    // --- 音声合成 (TTS) ---
    const speak = (text, onEndCallback) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ja-JP';
        msg.rate = 0.9;
        
        if (onEndCallback) {
          msg.onend = onEndCallback;
          msg.onerror = onEndCallback;
        }

        const voices = window.speechSynthesis.getVoices();
        const googleJaVoice = voices.find(v => v.lang.includes('ja') && v.name.toLowerCase().includes('google'));
        if (googleJaVoice) msg.voice = googleJaVoice;
        window.speechSynthesis.speak(msg);
      } else {
        if (onEndCallback) setTimeout(onEndCallback, 1500);
      }
    };

    // --- 効果音 ---
    const playSE = (audioCtx, type) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'incorrect') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      }
      osc.connect(gain);
      gain.connect(audioCtx.destination);
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const createWordItem = (word = '', meaning = '') => ({
      id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
      word,
      meaning
    });

    const SAMPLE_VOCAB_PAIRS = [
      { word: 'りんご', meaning: 'apple' },
      { word: 'トマト', meaning: 'tomato' },
      { word: 'たべます', meaning: 'eat' },
      { word: 'あかい', meaning: 'red' }
    ];

    const ensureMinimumWordRows = (items, minimum = 4) => {
      const nextItems = items.length > 0 ? [...items] : [];
      while (nextItems.length < minimum) {
        nextItems.push(createWordItem());
      }
      return nextItems;
    };

    const normalizeHeader = (value) => (
      String(value || '')
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[()/:.-]/g, '')
    );

    const WORD_HEADER_KEYS = ['word', 'words', 'term', 'kana', 'hiragana', 'katakana', 'romaji', 'reading', 'vocab', 'vocabulary', 'ことば', '単語', '言葉', '読み', 'カナ', 'カタカナ'];
    const MEANING_HEADER_KEYS = ['meaning', 'meanings', 'translation', 'translations', 'english', 'definition', 'gloss', '意味', '英語', '訳'];
    const WORD_RECOMMENDED_PATTERN = /^[a-zA-Z\u3041-\u3096\u30A1-\u30FFー\s'’-]+$/;

    const isRecommendedWordFormat = (value) => {
      const trimmed = value.trim();
      return trimmed === '' || WORD_RECOMMENDED_PATTERN.test(trimmed);
    };

    const extractWordMeaningPairs = (rows) => {
      const filledRows = rows
        .filter(row => Array.isArray(row))
        .map(row => row.map(cell => String(cell ?? '').trim()))
        .filter(row => row.some(cell => cell !== ''));

      if (filledRows.length === 0) return [];

      const headerRow = filledRows[0].map(normalizeHeader);
      const wordIndex = headerRow.findIndex(cell => WORD_HEADER_KEYS.includes(cell));
      const meaningIndex = headerRow.findIndex(cell => MEANING_HEADER_KEYS.includes(cell));

      const dataRows = wordIndex !== -1 && meaningIndex !== -1
        ? filledRows.slice(1).map(row => ({ word: row[wordIndex] || '', meaning: row[meaningIndex] || '' }))
        : filledRows.map(row => ({ word: row[0] || '', meaning: row[1] || '' }));

      return dataRows
        .map(item => ({ word: item.word.trim(), meaning: item.meaning.trim() }))
        .filter(item => item.word !== '' && item.meaning !== '');
    };

    const escapeHtml = (text) => String(text ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const toFileSafeName = (text, fallback) => {
      const normalized = String(text || '')
        .trim()
        .replace(/\s+/g, '_')
        .replace(/[^a-zA-Z0-9_-]/g, '');
      return normalized || fallback;
    };

    const downloadHtmlFile = (filename, htmlContent) => {
      const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    const buildFlashcardsHtml = (studentName, words) => {
      const serializedWords = JSON.stringify(words.map(({ word, meaning }) => ({ word, meaning }))).replace(/</g, '\\u003c');
      const safeStudentName = escapeHtml(studentName || 'Student');

      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Builder Flashcards</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #ecfeff 0%, #f8fafc 100%);
      color: #0f172a;
      min-height: 100vh;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .hero, .panel, .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .hero {
      padding: 28px;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
    }
    .hero p {
      margin: 0;
      color: #475569;

    }

      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(260px, 0.7fr);
      gap: 24px;
    }
    .card {
      padding: 24px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .card-label {
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: #0f766e;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .card-text {
      font-size: clamp(2.5rem, 8vw, 5rem);

    }
    .mini-card {
      background: white;

    }

      font-size: 1.4rem;

    .mini-card .meaning {
      color: #475569;

    }
    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; }
      .card { min-height: 340px; }
    }
  </style>
</head>
<body>
  <main class="page">

      <h1>Vocabulary Builder Flashcards</h1>

      </div>

        <div class="meta">
          <div class="meta-box"><span>Student</span><strong>${safeStudentName}</strong></div>
          <div class="meta-box"><span>Total Cards</span><strong id="cardTotal"></strong></div>
          <div class="meta-box"><span>Current Card</span><strong id="cardPosition"></strong></div>
        </div>
        <div class="controls">
          <button class="primary" id="listenBtn">Listen</button>
          <button class="dark" id="flipBtn">Flip Card</button>
          <button class="light" id="prevBtn">Previous</button>
          <button class="light" id="nextBtn">Next</button>
          <button class="light" id="shuffleBtn">Shuffle Deck</button>
        </div>
        <div class="counter" id="counterText"></div>
      </aside>
    </section>
    <section class="grid-list" id="allCards"></section>
  </main>

  <script>
    const cards = ${serializedWords};
    let currentIndex = 0;
    let showingMeaning = false;

    const cardLabel = document.getElementById('cardLabel');
    const cardText = document.getElementById('cardText');
    const cardPosition = document.getElementById('cardPosition');
    const cardTotal = document.getElementById('cardTotal');
    const counterText = document.getElementById('counterText');
    const allCards = document.getElementById('allCards');

    const speak = (text) => {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    };

    const escapeHtml = (text) => String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const renderMiniCards = () => {
      allCards.innerHTML = cards.map((card, index) => \`
        <article class="mini-card">
          <div class="word">\${index + 1}. \${escapeHtml(card.word)}</div>
          <div class="meaning">\${escapeHtml(card.meaning)}</div>
        </article>
      \`).join('');
    };

    const renderCard = () => {
      const currentCard = cards[currentIndex];
      cardLabel.textContent = showingMeaning ? 'Meaning' : 'Word';
      cardText.textContent = showingMeaning ? currentCard.meaning : currentCard.word;
      cardPosition.textContent = \`\${currentIndex + 1} / \${cards.length}\`;
      cardTotal.textContent = cards.length;
      counterText.textContent = showingMeaning
        ? 'You are viewing the meaning side.'
        : 'You are viewing the word side.';
    };

    const flipCard = () => {
      showingMeaning = !showingMeaning;
      renderCard();
    };

    const changeCard = (direction) => {
      currentIndex = (currentIndex + direction + cards.length) % cards.length;
      showingMeaning = false;
      renderCard();
    };

    const shuffleDeck = () => {
      for (let i = cards.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      currentIndex = 0;
      showingMeaning = false;
      renderCard();
      renderMiniCards();
    };

    document.getElementById('flashcard').addEventListener('click', flipCard);
    document.getElementById('flipBtn').addEventListener('click', flipCard);
    document.getElementById('prevBtn').addEventListener('click', () => changeCard(-1));
    document.getElementById('nextBtn').addEventListener('click', () => changeCard(1));
    document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
    document.getElementById('listenBtn').addEventListener('click', () => speak(cards[currentIndex].word));

    renderCard();
    renderMiniCards();
  <\/script>
</body>
</html>`;
    };

        </tr>
      `).join('');

      return `<!DOCTYPE html>

    const buildStudyPackHtml = (studentName, words) => {

  <main class="page">

        </div>
        <div class="counter" id="counterText"></div>
      </aside>

  </main>

  <script>
    const cards = ${serializedWords};
    let currentIndex = 0;
    let showingMeaning = false;

    const cardLabel = document.getElementById('cardLabel');
    const cardText = document.getElementById('cardText');
    const cardPosition = document.getElementById('cardPosition');
    const cardTotal = document.getElementById('cardTotal');
    const counterText = document.getElementById('counterText');

    const speak = (text) => {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    };

    const renderCard = () => {
      const currentCard = cards[currentIndex];
      cardLabel.textContent = showingMeaning ? 'Meaning' : 'Word';
      cardText.textContent = showingMeaning ? currentCard.meaning : currentCard.word;
      cardPosition.textContent = \`\${currentIndex + 1} / \${cards.length}\`;
      cardTotal.textContent = cards.length;
      counterText.textContent = showingMeaning
        ? 'You are viewing the meaning side.'
        : 'You are viewing the word side.';
    };

    const flipCard = () => {
      showingMeaning = !showingMeaning;
      renderCard();
    };

    const changeCard = (direction) => {
      currentIndex = (currentIndex + direction + cards.length) % cards.length;
      showingMeaning = false;
      renderCard();
    };

    const shuffleDeck = () => {
      for (let i = cards.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      currentIndex = 0;
      showingMeaning = false;
      renderCard();
    };

    document.getElementById('flashcard').addEventListener('click', flipCard);
    document.getElementById('flipBtn').addEventListener('click', flipCard);
    document.getElementById('prevBtn').addEventListener('click', () => changeCard(-1));
    document.getElementById('nextBtn').addEventListener('click', () => changeCard(1));
    document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
    document.getElementById('listenBtn').addEventListener('click', () => speak(cards[currentIndex].word));

    renderCard();
  <\/script>
</body>

    function App() {
      // 状態: 'intro', 'setup', 'flashcards', 'transition', 'step1', 'step2', 'step3', 'result'

        };

        const blockShortcut = (event) => {

          if ((event.ctrlKey || event.metaKey) && (key === 's' || key === 'c')) {
            event.preventDefault();
            event.stopPropagation();
          }
        };

        document.addEventListener('contextmenu', blockDefault, true);
        document.addEventListener('copy', blockDefault, true);
        window.addEventListener('keydown', blockShortcut, true);

        return () => {
          document.removeEventListener('contextmenu', blockDefault, true);
          document.removeEventListener('copy', blockDefault, true);
          window.removeEventListener('keydown', blockShortcut, true);
        };
      }, []);

      useEffect(() => {
        return () => {
          if (teacherTapTimeoutRef.current) {
            clearTimeout(teacherTapTimeoutRef.current);
          }
        };
      }, []);

      // 有効な単語のリスト
      const validWords = useMemo(() => {
        return wordList.filter(item => item.word.trim() !== '' && item.meaning.trim() !== '');
      }, [wordList]);

      useEffect(() => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
      }, []);

      const initAudio = () => {
        if (!audioCtxRef.current) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtxRef.current = new AudioContext();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      // --- Setup Logic ---
      const handleWordChange = (id, field, value) => {
        setWordList(prev => prev.map(item => {
          if (item.id === id) {
            return { ...item, [field]: value };
          }
          return item;
        }));
      };

      const addWordField = () => {
        setWordList(prev => [...prev, createWordItem()]);
      };

      const removeWordField = (id) => {
        setWordList(prev => ensureMinimumWordRows(prev.filter(item => item.id !== id)));
      };

      const handleImportFile = async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        try {
          if (!window.XLSX) {
            throw new Error('Spreadsheet import is not available right now.');
          }

          const buffer = await file.arrayBuffer();
          const workbook = window.XLSX.read(buffer, { type: 'array' });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = window.XLSX.utils.sheet_to_json(firstSheet, { header: 1, raw: false, defval: '' });
          const importedPairs = extractWordMeaningPairs(rows);

          if (importedPairs.length === 0) {
            throw new Error('No complete word / meaning pairs were found. Use columns named "word" and "meaning", or place them in the first two columns.');
          }

          setWordList(ensureMinimumWordRows(importedPairs.map(item => createWordItem(item.word, item.meaning))));
          setImportStatus({
            type: 'success',
            message: `Imported ${importedPairs.length} word / meaning pairs from ${file.name}.`
          });
        } catch (error) {
          setImportStatus({
            type: 'error',
            message: error.message || 'Could not read that spreadsheet file.'
          });
        }

        event.target.value = '';
      };

      const handleTeacherUnlockTap = () => {
        if (teacherModeUnlocked) return;

        teacherTapCountRef.current += 1;

        if (teacherTapTimeoutRef.current) {
          clearTimeout(teacherTapTimeoutRef.current);
        }

        teacherTapTimeoutRef.current = setTimeout(() => {
          teacherTapCountRef.current = 0;
        }, 1200);

        if (teacherTapCountRef.current >= 7) {
          teacherTapCountRef.current = 0;
          clearTimeout(teacherTapTimeoutRef.current);
          teacherTapTimeoutRef.current = null;
          setTeacherModeUnlocked(true);
        }
      };

      const openFlashcards = () => {
        if (validWords.length === 0) return;
        setFlashcardDeck([...validWords]);
        setFlashcardIndex(0);
        setShowFlashcardMeaning(false);
        setGameState('flashcards');
      };

      const reshuffleFlashcards = () => {
        if (validWords.length === 0) return;
        setFlashcardDeck(shuffleArray([...validWords]));
        setFlashcardIndex(0);
        setShowFlashcardMeaning(false);
      };

      const goToFlashcard = (direction) => {
        if (flashcardDeck.length === 0) return;
        setFlashcardIndex(prev => (prev + direction + flashcardDeck.length) % flashcardDeck.length);
        setShowFlashcardMeaning(false);
      };

      const downloadStudyPackHtml = (studentName = userName) => {
        if (validWords.length === 0) return;
        const safeStudentName = studentName.trim() || 'Student';
        const filename = `${toFileSafeName(safeStudentName, 'student')}_flashcards.html`;
        downloadHtmlFile(filename, buildStudyPackHtml(safeStudentName, validWords));
      };

      const startGame = () => {
        initAudio();
        setCurrentStep(1);
        setGameState('transition');
      };

      const startCurrentStep = () => {
        initAudio();
        setQueue(shuffleArray(validWords));
        setFeedback(null);
        setTypeInput('');
        setGameState(`step${currentStep}`);
      };

      const finishStep = () => {
        if (currentStep === 1) {
          setCurrentStep(2);
          setGameState('transition');
        } else if (currentStep === 2) {
          setCurrentStep(3);
          setGameState('transition');
        } else {
          setGameState('result');
        }
      };

      // --- Step 1 & 2 Logic (Multiple Choice) ---
      const currentTargetId = queue.length > 0 ? queue[0].id : null;

      useEffect(() => {
        if ((gameState === 'step1' || gameState === 'step2') && currentTargetId && feedback === null) {
          const target = queue[0];
          const others = validWords.filter(item => item.id !== target.id);
          const shuffledOthers = shuffleArray(others);
          const dummies = shuffledOthers.slice(0, 3);
          setOptions(shuffleArray([target, ...dummies]));
          
          if (gameState === 'step1') {
            setTimeout(() => speak(target.word), 300);
          }
        }
      }, [gameState, currentTargetId, feedback, validWords]);

      const handleMultipleChoice = (selectedItem) => {
        if (feedback !== null || queue.length === 0) return;
        const target = queue[0];
        const isCorrect = selectedItem.id === target.id;

        if (isCorrect) {
          setFeedback('correct');
          playSE(audioCtxRef.current, 'correct');
          
          if (gameState === 'step2') {
             speak(target.word);
          }

          setTimeout(() => {
            setFeedback(null);
            const nextQueue = queue.slice(1);
            if (nextQueue.length === 0) {
               finishStep();
            } else {
               setQueue(nextQueue);
            }
          }, 1000);
        } else {
          setFeedback('incorrect');
          playSE(audioCtxRef.current, 'incorrect');
          setTimeout(() => {
            setFeedback(null);
            const newQueue = [...queue.slice(1), target];
            setQueue(newQueue);
          }, 1000);
        }
      };

      // --- Step 3 Logic (Typing) ---
      const handleTypingSubmit = (e) => {
        e?.preventDefault();
        if (feedback !== null || queue.length === 0 || typeInput.trim() === '') return;
        const target = queue[0];
        
        // 柔軟な判定ロジック
        // 1. 入力とターゲットを両方ローマ字に変換＆正規化して比較（ひらがな・ローマ字の相互判定、綴りの揺れ吸収）
        const inputNorm = normalizeRomaji(toRomaji(typeInput));
        const targetNorm = normalizeRomaji(toRomaji(target.word));
        
        // 2. 完全に一致するかどうか（漢字などで入力された場合のセーフティネット）
        const exactMatch = normalizeString(typeInput) === normalizeString(target.word);
        
        const isCorrect = inputNorm === targetNorm || exactMatch;

        if (isCorrect) {
          setFeedback('correct');
          playSE(audioCtxRef.current, 'correct');
          speak(target.word);
          setTimeout(() => {
            setFeedback(null);
            setTypeInput('');
            const nextQueue = queue.slice(1);
            if (nextQueue.length === 0) {
               finishStep();
            } else {
               setQueue(nextQueue);
            }
          }, 1000);
        } else {
          setFeedback('incorrect');
          playSE(audioCtxRef.current, 'incorrect');
          setTimeout(() => {
            setFeedback(null);
            setTypeInput('');
            const newQueue = [...queue.slice(1), target];
            setQueue(newQueue);

        }
      };

      // --- Certificate Download ---
      const downloadCertificate = (studentName = userName) => {

        canvas.height = Math.max(600, 450 + validWords.length * 40);
        const ctx = canvas.getContext('2d');

        // 背景
        ctx.fillStyle = '#f8fafc'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ヘッダー背景
        ctx.fillStyle = '#0f766e'; 
        ctx.fillRect(0, 0, canvas.width, 180);

        // 枠線
        ctx.strokeStyle = '#14b8a6'; 
        ctx.lineWidth = 10;
        ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

        // タイトル
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 50px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Vocabulary Builder Certificate', canvas.width / 2, 80);

        ctx.font = '30px sans-serif';
        ctx.fillText('3-Step Mastery Completed', canvas.width / 2, 130);

        ctx.textAlign = 'left';
        ctx.font = 'bold 35px sans-serif';
        ctx.fillText(`Student: ${safeStudentName}`, 60, 250);
        
        const date = new Date().toLocaleString();
        ctx.fillStyle = '#64748b'; 
        ctx.font = '24px sans-serif';
        ctx.fillText(`Completed on: ${date}`, 60, 290);

        ctx.font = 'bold 28px sans-serif';
        ctx.fillText('I hereby declare that I have mastered the following words:', 60, 360);

        ctx.font = '28px sans-serif';
        
        // 2列で描画

        const col2X = 520;
        let startY = 420;
        const rowHeight = 40;

        validWords.forEach((item, index) => {
          const text = `${index + 1}. ${item.word} = ${item.meaning}`;

          const y = startY + Math.floor(index / 2) * rowHeight;

        );
      };

      const renderStep3Screen = () => {
        const target = queue[0];
        if (!target) return null;

        return (
          <div className="flex flex-col items-center justify-center h-full max-w-3xl mx-auto w-full p-4 sm:p-6 animate-in fade-in duration-300">
            <div className="w-full flex justify-between items-center mb-6 px-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3">
                 <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold bg-rose-500">3</div>
                 <span className="font-bold text-slate-700 text-lg hidden sm:block">Typing</span>
              </div>
              <div className="flex items-center gap-3 font-bold bg-slate-100 px-4 py-2 rounded-full text-slate-600 border border-slate-200">
                <Icon name="ListTodo" size={20} /> {validWords.length - queue.length + 1} / {validWords.length}
              </div>
            </div>

            <div className={`bg-white w-full rounded-3xl shadow-2xl border-b-8 border-rose-500 p-6 sm:p-10 text-center relative overflow-hidden flex flex-col items-center min-h-[450px]`}>
              
              <p className="text-slate-400 font-bold tracking-widest uppercase mb-6 text-sm">
                Type the Word (Romaji, Hiragana, or Katakana)
              </p>
              
              <div className="w-full bg-slate-50 border border-slate-100 rounded-3xl py-10 px-4 mb-8 shadow-inner flex flex-col items-center justify-center flex-1">
                <h2 className="text-4xl sm:text-5xl font-black text-slate-800 break-words mb-2">
                  {target.meaning}
                </h2>
              </div>

              <form onSubmit={handleTypingSubmit} className="w-full max-w-md mx-auto">
                <input 
                   type="text"
                   autoFocus
                   disabled={feedback !== null}
                   placeholder="Type here..."
                   value={typeInput}
                   onChange={(e) => setTypeInput(e.target.value)}
                   className={`w-full text-center text-3xl kyokasho-font p-6 bg-slate-100 border-4 rounded-2xl focus:outline-none transition-all shadow-inner
                     ${feedback === null ? 'border-slate-300 focus:border-rose-400 text-slate-800' : 
                       feedback === 'correct' ? 'border-green-500 text-green-700 bg-green-50' : 'border-red-500 text-red-700 bg-red-50'}`}
                />
                
                <button 
                  type="submit"
                  disabled={feedback !== null || typeInput.trim() === ''}
                  className="w-full mt-4 py-4 text-xl font-bold rounded-xl bg-slate-800 text-white hover:bg-slate-700 transition-all transform active:scale-95 disabled:opacity-50 disabled:active:scale-100 shadow-lg flex items-center justify-center gap-2"
                >
                  <Icon name="Send" size={24} /> Submit Answer
                </button>
              </form>

              {feedback === 'incorrect' && (
                <div className="absolute top-[60%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-11/12 bg-white border-4 border-red-500 p-6 rounded-3xl shadow-2xl z-30 animate-in zoom-in spin-in-2 flex flex-col items-center">
                  <Icon name="XCircle" size={60} className="text-red-500 mb-2" />
                  <p className="text-slate-500 font-bold uppercase tracking-widest text-sm mb-1">Correct Answer</p>
                  <p className="text-4xl font-black text-slate-800 kyokasho-font">{target.word}</p>
                </div>
              )}
              
              {feedback === 'correct' && (
                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none animate-in zoom-in duration-300 bg-white/50 backdrop-blur-sm">
                  <Icon name="CheckCircle" size={160} className="text-green-500 drop-shadow-2xl bg-white rounded-full" />
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderResultScreen = () => {
        return (
          <div className="flex flex-col items-center justify-center h-full max-w-2xl mx-auto w-full p-4 sm:p-6 animate-in zoom-in duration-500">
            <div className="bg-white w-full rounded-3xl shadow-2xl border border-slate-200 p-8 sm:p-10 text-center">
              <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-teal-100 text-teal-700 font-bold mb-6">
                <Icon name="Award" size={18} /> 3-Step Mastery Complete
              </div>

              <h2 className="text-4xl md:text-5xl font-black text-slate-900 mb-3 tracking-tight">Mastery achieved</h2>
              <p className="text-lg md:text-xl text-slate-500 font-bold mb-8">
                You completed all {validWords.length} vocabulary pairs. Your rewards are ready below.
              </p>
              
              <div className="grid sm:grid-cols-2 gap-4 mb-8">
                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-5">
                  <div className="text-xs font-black uppercase tracking-[0.25em] text-slate-400 mb-2">Mastered</div>
                  <div className="text-5xl font-black text-slate-900">{validWords.length}</div>
                </div>
                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-5">
                  <div className="text-xs font-black uppercase tracking-[0.25em] text-slate-400 mb-2">Rewards</div>
                  <div className="text-2xl font-black text-slate-900 break-words">Certificate + Flashcards</div>
                </div>
              </div>

              <div className="grid sm:grid-cols-2 gap-4 mb-4">
                <button 
                  onClick={() => openExportModal('certificate')}
                  className="flex-1 py-5 text-lg font-black rounded-xl bg-slate-800 text-white hover:bg-slate-700 transition-all transform active:scale-95 shadow-xl flex items-center justify-center gap-3"
                >
                  <Icon name="Award" size={24} /> Get Certificate
                </button>
                <button
                  onClick={() => openExportModal('studyPack')}
                  className="flex-1 py-5 text-lg font-black rounded-xl bg-teal-500 text-white hover:bg-teal-400 transition-all transform active:scale-95 shadow-xl flex items-center justify-center gap-3"
                >
                  <Icon name="Download" size={24} /> Export Flashcards HTML
                </button>
              </div>

              <div>
                <button 
                  onClick={() => setGameState('setup')}
                  className="w-full py-5 text-lg font-bold rounded-xl bg-white border-4 border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-all transform active:scale-95 flex items-center justify-center gap-2"
                >
                  <Icon name="Home" size={24} /> Edit List
                </button>
              </div>

            </div>
          </div>
        );
      };

      return (
        <div className="h-screen bg-slate-100 font-sans overflow-hidden select-none touch-none flex flex-col">
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap');
            .kyokasho-font { font-family: 'Klee One', serif; }
          `}} />
          
          {gameState === 'intro' && renderIntroScreen()}
          {gameState === 'setup' && renderSetupScreen()}
          {gameState === 'flashcards' && renderFlashcardsScreen()}
          {gameState === 'transition' && renderTransitionScreen()}
          {(gameState === 'step1' || gameState === 'step2') && renderStep12Screen()}
          {gameState === 'step3' && renderStep3Screen()}
          {gameState === 'result' && renderResultScreen()}
          {renderToolsModal()}
          {renderExportModal()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
