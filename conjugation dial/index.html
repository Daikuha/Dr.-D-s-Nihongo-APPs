            // --- Audio Logic ---
            const playClick = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.05);
                } catch(e){}
            };
            
            const playCorrectSound = () => {
                try {

                    const gain = ctx.createGain();

                    osc.frequency.setValueAtTime(880, ctx.currentTime); // A5
                    osc.frequency.setValueAtTime(1108.73, ctx.currentTime + 0.1); // C#6
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } catch(e){}

                const [isOpen, setIsOpen] = useState(false);
                
                const themeColors = {
                    rose: "text-rose-700 bg-rose-100 hover:bg-rose-200 border-rose-200",
                    blue: "text-blue-700 bg-blue-100 hover:bg-blue-200 border-blue-200",
                    purple: "text-purple-700 bg-purple-100 hover:bg-purple-200 border-purple-200"
                };
                
                return (
                    <div className={`rounded-xl border shadow-sm overflow-hidden shrink-0 transition-all mb-4 ${isOpen ? 'bg-white/90' : 'bg-white/60'} ${themeColors[colorTheme].split(' ')[2]}`}>
                    <button 
                    onClick={() => setIsOpen(!isOpen)}
                    className={`w-full flex justify-between items-center p-3 text-sm font-bold transition-colors ${themeColors[colorTheme].split(' ').slice(0,2).join(' ')} ${themeColors[colorTheme].split(' ')[2]}`}
                    >
                    <span className="flex items-center gap-2"><Icon name="Info" size={16} /> {title}</span>
                    <Icon name={isOpen ? "ChevronUp" : "ChevronDown"} size={16} />
                    </button>
                    {isOpen && (
                            <div className="p-4 border-t border-white/40 pop-in">
                            {children}
                            </div>
                    )}
                    </div>
                );
            };
            
            
            // 母音ごとに色を分けるコンポーネント
            const ColoredRomaji = ({ text, isCorrect, highlightVowel }) => {
                if (!text || text === "-") return <span className="text-slate-300">-</span>;
                
                if (!highlightVowel) {
                    return <span>{text}</span>;
                }
                
                const getColor = (char) => {
                    const lower = char.toLowerCase();
                    if (lower === 'a') return 'text-red-500';
                    if (lower === 'i') return 'text-blue-500';
                    if (lower === 'u') return 'text-emerald-500';
                    if (lower === 'e') return 'text-pink-500';
                    if (lower === 'o') return 'text-orange-500';
                    return isCorrect ? 'text-green-600' : 'text-slate-400';
                };
                
                return (
                    <span className="font-bold tracking-widest whitespace-nowrap">
                    {text.split('').map((char, i) => (
                                <span key={i} className={getColor(char)}>{char}</span>
                    ))}
                    </span>
                );
            };
            
            const HighlightedMasuRomaji = ({ wordData }) => {
                const romaji = wordData.masuRomaji;
                const isGroup1 = wordData.id.startsWith('g1_');
                
                if (!isGroup1) {
                    return <span className="font-bold tracking-widest whitespace-nowrap">{romaji}</span>;
                }
                
                const masuIndex = romaji.toLowerCase().lastIndexOf("masu");
                if (masuIndex > 0) {
                    const beforeMasu = romaji.substring(0, masuIndex);
                    const lastChar = beforeMasu.slice(-1);
                    const prefix = beforeMasu.slice(0, -1);
                    const suffix = romaji.substring(masuIndex);
                    
                    return (
                        <span className="font-bold tracking-widest whitespace-nowrap">
                        {prefix}
                        <span className="text-blue-500">{lastChar}</span>
                        {suffix}
                        </span>
                    );
                }
                
                return <span className="font-bold tracking-widest whitespace-nowrap">{romaji}</span>;
            };
            
            const Slot = ({ options, selectedIndex, onChange, locked, isCorrect, highlightVowel }) => {
                const opts = options || [{kana: "-", romaji: "-"}];
                const currentOpt = opts[selectedIndex] !== undefined ? opts[selectedIndex] : opts[0];
                
                const displayContent = (opt) => (
                    <div className="flex flex-col items-center justify-center h-full w-full px-1 pt-1">
                    <span className={`text-lg md:text-xl font-black kyokasho-font tracking-tighter whitespace-nowrap ${isCorrect ? 'text-green-600' : 'text-slate-800'}`}>
                    {opt.kana === "-" ? <span className="text-slate-300">-</span> : opt.kana}
                    </span>
                    {opt.romaji !== "-" && (
                            <span className={`text-[10px] md:text-[11px] mt-0.5 whitespace-nowrap ${!highlightVowel ? (isCorrect ? 'text-green-500' : 'text-blue-500') : ''}`}>
                            <ColoredRomaji text={opt.romaji} isCorrect={isCorrect} highlightVowel={highlightVowel} />
                            </span>
                    )}
                    </div>
                );
                
                if (locked) {
                    return (
                        <div className="flex flex-col items-center bg-slate-200 rounded-lg overflow-hidden border-2 border-slate-300 flex-1 min-w-[56px] max-w-[96px] md:max-w-[104px] shadow-inner opacity-80">
                        <div className="w-full py-1.5 flex justify-center bg-slate-300 text-slate-400">
                        <Icon name="Lock" size={14} />
                        </div>
                        <div className="slot-window bg-slate-100 w-full h-16 md:h-20 flex items-center justify-center overflow-hidden relative">
                        {displayContent(currentOpt)}
                        </div>
                        <div className="w-full py-1.5 flex justify-center bg-slate-300 text-slate-400">
                        <Icon name="Lock" size={14} />
                        </div>
                        </div>
                    );
                }
                
                const handleUp = () => { if(opts.length) { playClick(); onChange((selectedIndex - 1 + opts.length) % opts.length); } };
                const handleDown = () => { if(opts.length) { playClick(); onChange((selectedIndex + 1) % opts.length); } };
                
                return (
                    <div className={`flex flex-col items-center rounded-lg overflow-hidden border-2 flex-1 min-w-[56px] max-w-[96px] md:max-w-[104px] shadow-inner transition-colors duration-300 ${isCorrect ? 'bg-green-600 border-green-500' : 'bg-slate-800 border-slate-700'}`}>
                    <button onClick={handleUp} disabled={isCorrect} className={`w-full py-1.5 flex justify-center transition-colors ${isCorrect ? 'bg-green-500 text-green-200' : 'bg-slate-700 hover:bg-slate-600 text-slate-300 active:bg-slate-500'}`}>
                    <Icon name="ChevronUp" size={16} />
                    </button>
                    <div className="slot-window bg-white w-full h-16 md:h-20 flex items-center justify-center overflow-hidden relative">
                    {displayContent(currentOpt)}
                    </div>
                    <button onClick={handleDown} disabled={isCorrect} className={`w-full py-1.5 flex justify-center transition-colors ${isCorrect ? 'bg-green-50 text-green-200' : 'bg-slate-700 hover:bg-slate-600 text-slate-300 active:bg-slate-500'}`}>
                    <Icon name="ChevronDown" size={16} />
                    </button>
                    </div>
                );
            };
            
            const WordDial = ({ wordData, targetForm, onCorrect }) => {
                const getInitialSelections = () => {
                    const currentFormObj = wordData.forms[targetForm];
                    return wordData.slots.map((slot, idx) => {
                            let init = slot.initial !== undefined ? slot.initial : 0;
                            if (init === currentFormObj.correct[idx] && !slot.locked) {
                                init = (init + 1) % slot.options.length;
                            }
                            return init;
                    });
                };
                
                const [selections, setSelections] = useState(getInitialSelections());
                const [isCorrect, setIsCorrect] = useState(false);
                const [isError, setIsError] = useState(false);
                
                const currentFormObj = wordData.forms[targetForm];
                const correctWordKana = currentFormObj.dict;
                const correctWordRomaji = currentFormObj.correct.map((selIdx, slotIdx) => wordData.slots[slotIdx].options[selIdx].romaji).filter(r => r !== '-').join('');
                
                useEffect(() => {
                        setSelections(getInitialSelections());
                        setIsCorrect(false);
                        setIsError(false);
                }, [targetForm, wordData]);
                
                const handleChange = (idx, val) => {
                    if (isCorrect) return;
                    const newSels = [...selections];
                    newSels[idx] = val;
                    setSelections(newSels);
                    setIsError(false);
                };
                
                const handleCheck = () => {
                    if (isCorrect) return;
                    const correctIndices = currentFormObj.correct;
                    const correct = correctIndices.every((c, idx) => c === selections[idx]);
                    if (correct) {
                        setIsCorrect(true);
                        playCorrectSound();
                        speakWord(currentFormObj.dict);
                        onCorrect(wordData.id);
                    } else {
                        playErrorSound();
                        setIsError(true);
                        setTimeout(() => setIsError(false), 400);
                    }
                };
                
                const displayEnglish = useMemo(() => {
                        if (targetForm === 'te' && wordData.id === 'g1_10') return `${wordData.english} (exception)`;
                        if (targetForm === 'nai' && wordData.id === 'g1_1') return `${wordData.english} (exception)`;
                        return wordData.english;
                }, [targetForm, wordData]);
                
                return (
                    <div className={`shrink-0 p-3 md:p-4 rounded-2xl mb-4 border-2 transition-all relative overflow-hidden ${isCorrect ? 'bg-green-50 border-green-400 shadow-[0_0_15px_rgba(74,222,128,0.3)]' : 'bg-white border-slate-200 shadow-sm'} ${isError ? 'shake border-red-400' : ''}`}>
                    {isCorrect && <div className="absolute inset-0 bg-green-400 opacity-10 pointer-events-none"></div>}
                    
                    {isCorrect ? (
                            <div className="flex flex-col items-center justify-center py-2 pop-in relative z-10 w-full">
                            <span className="text-xs font-bold text-slate-500 tracking-wider mb-4 uppercase">{displayEnglish}</span>
                            
                            <div className="flex flex-col items-center justify-center gap-2 w-full">
                            <div className="flex flex-col items-center w-full">
                            <span className="text-lg md:text-xl font-black text-slate-600 kyokasho-font mb-1">{wordData.masu}</span>
                            <span className="text-[10px] md:text-xs bg-white px-2 py-1 rounded border border-slate-200 text-slate-500 shadow-sm">
                            <HighlightedMasuRomaji wordData={wordData} />
                            </span>
                            </div>
                            
                            <div className="flex flex-col items-center justify-center text-green-500 shrink-0 py-1">
                            <Icon name="ArrowDown" size={20} className="animate-pulse" />
                            </div>
                            
                            <div className="flex flex-col items-center w-full">
                            <span className="text-2xl md:text-3xl font-black text-green-700 kyokasho-font mb-1">{correctWordKana}</span>
                            <span className="text-[10px] md:text-xs bg-green-100 px-2 py-1 rounded border border-green-300 text-green-700 shadow-sm uppercase tracking-widest">
                            <ColoredRomaji text={correctWordRomaji} isCorrect={true} highlightVowel={false} />
                            </span>
                            </div>
                            </div>
                            </div>
                        ) : (
                            <>
                            <div className="flex justify-between items-start mb-3">
                            <div className="flex flex-col justify-center">
                            <span className="text-sm md:text-base font-bold text-slate-500 tracking-wider">{displayEnglish}</span>
                            </div>
                            </div>
                            
                            <div className="flex gap-1.5 md:gap-2 items-center justify-center mb-4 px-1 w-full">
                            {wordData.slots.map((slot, i) => (
                                        <Slot 
                                        key={i} 
                                        options={slot.options} 
                                        locked={slot.locked} 
                                        selectedIndex={slot.locked ? 0 : selections[i]} 
                                        onChange={(val) => handleChange(i, val)}
                                        isCorrect={isCorrect}
                                        highlightVowel={wordData.id.startsWith('g1_') && i === 1}
                                        />
                            ))}
                            </div>
                            
                            <button 
                            onClick={handleCheck}
                            className={`w-full text-white font-bold py-3 rounded-xl transition-colors text-lg shadow-[0_3px_0_0] active:shadow-none active:translate-y-1
                            ${targetForm === 'dictionary' ? 'bg-blue-500 hover:bg-blue-600 shadow-[rgba(29,78,216,1)]' : targetForm === 'nai' ? 'bg-red-500 hover:bg-red-600 shadow-[rgba(185,28,28,1)]' : 'bg-purple-500 hover:bg-purple-600 shadow-[rgba(168,85,247,1)]'}`}
                            >
                            check
                            </button>
                            </>
                    )}
                    </div>
                );
            };
            
            const TitleScreen = ({ onStart }) => {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-900 text-white relative overflow-hidden">
                    <div className="absolute inset-0 opacity-20 pointer-events-none">
                    <div className="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-500 rounded-full mix-blend-screen filter blur-[100px] animate-pulse"></div>
                    <div className="absolute top-1/3 right-1/4 w-64 h-64 bg-purple-500 rounded-full mix-blend-screen filter blur-[100px] animate-pulse delay-1000"></div>
                    <div className="absolute bottom-1/4 left-1/3 w-64 h-64 bg-red-500 rounded-full mix-blend-screen filter blur-[100px] animate-pulse delay-2000"></div>
                    </div>
                    
                    <div className="text-center mb-16 relative z-10">
                    <div className="flex justify-center mb-8">
                    <Icon name="Settings" size={100} className="text-slate-400 animate-[spin_12s_linear_infinite]" />
                    </div>
                    <h1 className="text-5xl md:text-7xl font-black italic tracking-tighter mb-4 text-white drop-shadow-lg">verb conjugation dial</h1>
                    <p className="text-slate-400 font-bold uppercase tracking-widest text-sm">Select a target form to start the training</p>
                    </div>
                    
                    <div className="flex flex-col md:flex-row gap-4 md:gap-6 w-full max-w-3xl px-4 relative z-10">
                    <button onClick={() => onStart('dictionary')} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black text-xl md:text-2xl py-8 rounded-3xl shadow-[0_6px_0_0_rgba(30,58,138,1)] active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-3 group">
                    <Icon name="BookOpen" size={40} className="group-hover:scale-110 transition-transform" />
                    Dictionary Form
                    </button>
                    <button onClick={() => onStart('nai')} className="flex-1 bg-red-500 hover:bg-red-400 text-white font-black text-xl md:text-2xl py-8 rounded-3xl shadow-[0_6px_0_0_rgba(153,27,27,1)] active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-3 group">
                    <Icon name="XCircle" size={40} className="group-hover:scale-110 transition-transform" />
                    Nai Form
                    </button>
                    <button onClick={() => onStart('te')} className="flex-1 bg-purple-500 hover:bg-purple-400 text-white font-black text-xl md:text-2xl py-8 rounded-3xl shadow-[0_6px_0_0_rgba(126,34,206,1)] active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-3 group">
                    <Icon name="Link" size={40} className="group-hover:scale-110 transition-transform" />
                    Te Form
                    </button>
                    </div>
                    </div>
                );
            };
            
            function App() {
                const [gameState, setGameState] = useState('title');
                const [targetForm, setTargetForm] = useState("dictionary");
                const [clearedIds, setClearedIds] = useState(new Set());
                const [showClear, setShowClear] = useState(false);
                
                // 証明書発行用のステート
                const [playerName, setPlayerName] = useState("");
                const [isGeneratingImg, setIsGeneratingImg] = useState(false);
                const certificateRef = useRef(null);
                
                useEffect(() => {
                        if ('speechSynthesis' in window) {
                            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
                        }
                }, []);
                
                const currentClearedCount = useMemo(() => {
                        return Array.from(clearedIds).filter(id => id.startsWith(targetForm)).length;
                }, [clearedIds, targetForm]);
                
                const handleStart = (form) => {
                    setTargetForm(form);
                    setClearedIds(new Set());
                    setShowClear(false);
                    setGameState('playing');
                };
                
                const handleBackToMenu = () => {
                    setGameState('title');
                    setClearedIds(new Set());
                    setShowClear(false);
                    setPlayerName("");
                };
                
                const handleCorrect = useCallback((id) => {
                        setClearedIds(prev => {
                                const next = new Set(prev);
                                next.add(`${targetForm}_${id}`);
                                return next;
                        });
                }, [targetForm]);
                
                useEffect(() => {
                        if (currentClearedCount === TOTAL_WORDS && currentClearedCount > 0) {
                            setTimeout(() => {
                                    playClearSound();
                                    setShowClear(true);
                            }, 500);
                        }
                }, [currentClearedCount]);
                
                const handleResetForm = () => {
                    setClearedIds(prev => {
                            const next = new Set(prev);
                            for (const item of next) {
                                if (item.startsWith(targetForm)) next.delete(item);
                            }
                            return next;
                    });
                    setShowClear(false);
                    setPlayerName("");
                };
                
                const getProgressBarColor = () => {
                    if (targetForm === 'dictionary') return 'from-blue-400 to-blue-600';
                    if (targetForm === 'nai') return 'from-red-400 to-red-600';
                    return 'from-purple-400 to-purple-600';
                };
                
                const getFormTitle = () => {
                    if (targetForm === 'dictionary') return 'dictionary form';
                    if (targetForm === 'nai') return 'nai form';
                    return 'te form';
                };
                
                // 証明書ダウンロード関数
                const downloadCertificate = async () => {
                    if (!certificateRef.current || isGeneratingImg) return;
                    setIsGeneratingImg(true);
                    try {
                        const canvas = await window.html2canvas(certificateRef.current, {
                                scale: 2,
                                backgroundColor: "#ffffff",
                                logging: false
                        });
                        const image = canvas.toDataURL("image/png");
                        const safeName = playerName.trim() || "Learner";
                        const link = document.createElement("a");
                        link.download = `Verb_Conjugation_Master_${targetForm}_${safeName}.png`;
                        link.href = image;
                        link.click();
                    } catch (error) {
                        console.error("Certificate generation failed:", error);
                    } finally {
                        setIsGeneratingImg(false);
                    }
                };
                
                if (gameState === 'title') {
                    return <TitleScreen onStart={handleStart} />;
                }
                
                return (
                    <div className="min-h-screen w-full flex flex-col items-center pt-6 pb-16 bg-slate-100">
                    
                    <header className="w-full max-w-6xl flex justify-between items-center mb-6 px-4 md:px-8">
                    <button 
                    onClick={handleBackToMenu} 
                    className="flex items-center gap-1 text-slate-500 hover:text-slate-800 font-bold transition-colors bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200 active:scale-95"
                    >
                    <Icon name="ArrowLeft" size={18} /> <span className="hidden md:inline">Menu</span>
                    </button>
                    
                    <div className="text-center">
                    <h1 className={`text-2xl md:text-4xl font-black italic tracking-tighter ${targetForm === 'dictionary' ? 'text-blue-600' : targetForm === 'nai' ? 'text-red-500' : 'text-purple-600'}`}>
                    {getFormTitle()}
                    </h1>
                    </div>
                    
                    <div className="bg-slate-800 text-white font-bold px-4 py-2 rounded-full shadow-sm text-sm">
                    {currentClearedCount} / {TOTAL_WORDS}
                    </div>
                    </header>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8 w-full max-w-6xl px-4 md:px-8">
                    
                    {/* Group 1 */}
                    <div className="bg-rose-50 p-4 md:p-6 rounded-3xl border-4 border-rose-200 relative flex flex-col h-[750px] md:h-[800px] shadow-sm">
                    <div className="flex items-center gap-3 mb-4 shrink-0">
                    <div className="bg-rose-500 text-white font-black w-10 h-10 rounded-full flex items-center justify-center text-xl shadow-lg border-2 border-rose-300">Ⅰ</div>
                    <h2 className="text-2xl md:text-3xl font-black text-rose-800">group Ⅰ</h2>
                    </div>
                    <RuleAccordion title="Grammar Rule" colorTheme="rose">
                    {RULES[targetForm].g1}
                    </RuleAccordion>
                    <div className="flex flex-col flex-1 overflow-y-auto pr-2 no-scrollbar">
                    {DIAL_WORDS.group1.map(w => <WordDial key={`${w.id}-${targetForm}`} wordData={w} targetForm={targetForm} onCorrect={handleCorrect} />)}
                    </div>
                    </div>
                    
                    {/* Group 2 */}
                    <div className="bg-blue-50 p-4 md:p-6 rounded-3xl border-4 border-blue-200 relative flex flex-col h-[750px] md:h-[800px] shadow-sm">
                    <div className="flex items-center gap-3 mb-4 shrink-0">
                    <div className="bg-blue-500 text-white font-black w-10 h-10 rounded-full flex items-center justify-center text-xl shadow-lg border-2 border-blue-300">Ⅱ</div>
                    <h2 className="text-2xl md:text-3xl font-black text-blue-800">group Ⅱ</h2>
                    </div>
                    <RuleAccordion title="Grammar Rule" colorTheme="blue">
                    {RULES[targetForm].g2}
                    </RuleAccordion>
                    <div className="flex flex-col flex-1 overflow-y-auto pr-2 no-scrollbar">
                    {DIAL_WORDS.group2.map(w => <WordDial key={`${w.id}-${targetForm}`} wordData={w} targetForm={targetForm} onCorrect={handleCorrect} />)}
                    </div>
                    </div>
                    
                    {/* Group 3 */}
                    <div className="bg-purple-50 p-4 md:p-6 rounded-3xl border-4 border-purple-200 relative flex flex-col h-[750px] md:h-[800px] shadow-sm">
                    <div className="flex items-center gap-3 mb-4 shrink-0">
                    <div className="bg-purple-500 text-white font-black w-10 h-10 rounded-full flex items-center justify-center text-xl shadow-lg border-2 border-purple-300">Ⅲ</div>
                    <h2 className="text-2xl md:text-3xl font-black text-purple-800">group Ⅲ</h2>
                    </div>
                    <RuleAccordion title="Grammar Rule" colorTheme="purple">
                    {RULES[targetForm].g3}
                    </RuleAccordion>
                    <div className="flex flex-col flex-1 overflow-y-auto pr-2 no-scrollbar">
                    {DIAL_WORDS.group3.map(w => <WordDial key={`${w.id}-${targetForm}`} wordData={w} targetForm={targetForm} onCorrect={handleCorrect} />)}
                    </div>
                    </div>
                    
                    </div>
                    
                    {/* Clear Overlay */}
                    {showClear && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-50 pop-in p-4 overflow-y-auto">
                            <div ref={certificateRef} className="bg-white p-8 md:p-12 rounded-3xl text-center max-w-lg w-full border-8 border-yellow-400 shadow-[0_0_80px_rgba(250,204,21,0.6)] relative overflow-hidden mb-6 flex-shrink-0">
                            <div className="absolute inset-0 bg-yellow-400 opacity-5 pointer-events-none"></div>
                            <div className="text-8xl mb-4 relative z-10 drop-shadow-md">👑</div>
                            
                            <h2 className="text-xl font-bold text-slate-400 mb-2 uppercase tracking-widest relative z-10">Certificate of Mastery</h2>
                            <h3 className="text-4xl md:text-5xl font-black text-yellow-500 mb-8 tracking-tighter relative z-10">ALL CLEAR!</h3>
                            
                            <div className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 relative z-10">
                            <label className="block text-xs font-bold text-slate-400 mb-1 uppercase">Presented to</label>
                            <input 
                            type="text" 
                            maxLength="20"
                            placeholder="Enter Your Name" 
                            value={playerName}
                            onChange={(e) => setPlayerName(e.target.value)}
                            className="w-full text-center text-3xl font-black text-slate-800 bg-transparent border-none focus:outline-none focus:ring-0 placeholder-slate-300 select-text"
                            />
                            </div>
                            
                            <p className="text-slate-600 font-bold text-lg mb-4 relative z-10">
                            You have mastered the <br/>
                            <span className={`text-2xl font-black uppercase tracking-tighter ${targetForm === 'dictionary' ? 'text-blue-600' : targetForm === 'nai' ? 'text-red-600' : 'text-purple-600'}`}>
                            {getFormTitle()}
                            </span>
                            </p>
                            
                            <div className="text-[10px] text-slate-400 font-bold mt-4 pt-4 border-t border-slate-100 relative z-10 uppercase tracking-widest">
                            Verb Conjugation Dial App
                            </div>
                            </div>
                            
                            <div className="flex flex-col gap-3 w-full max-w-lg flex-shrink-0">
                            <button 
                            onClick={downloadCertificate} 
                            disabled={isGeneratingImg}
                            className={`w-full text-white font-black text-xl py-4 rounded-2xl shadow-[0_6px_0_0] active:translate-y-1 active:shadow-none transition-all flex justify-center items-center gap-3
                            ${isGeneratingImg ? 'bg-slate-500' : 'bg-green-600 hover:bg-green-500 shadow-[rgba(22,101,52,1)]'}`}
                            >
                            <Icon name="Download" size={24} />
                            {isGeneratingImg ? "Generating..." : "Save Certificate as PNG"}
                            </button>
                            
                            <button 
                            onClick={handleBackToMenu} 
                            className="w-full bg-slate-800 text-white font-bold text-lg py-4 rounded-2xl shadow-[0_6px_0_0_rgba(0,0,0,1)] hover:bg-slate-700 active:translate-y-1 active:shadow-none transition-all"
                            >
                            BACK TO MENU
                            </button>
                            </div>
                            </div>
                    )}
                    </div>
                );
            }
            
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        </script>
    </body>
</html>
