<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Karuta</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- Lucide Icon Component Helper ---
    const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
      const iconData = useMemo(() => {
        if (!window.lucide || !lucide.icons) return null;
        const key = name.charAt(0).toLowerCase() + name.slice(1);
        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
      }, [name]);

      if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill={fill}
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          dangerouslySetInnerHTML={{
            __html: iconData.map(([tag, attrs]) => {
              const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ");
              return `<${tag} ${attrStr} />`;
            }).join("")
          }}
        />
      );
    };

    // --- 国のデータ (33ヶ国) ---
    const COUNTRIES = [
      { id: 'usa', text: 'アメリカ', english: 'U.S.A.', romaji: 'amerika', flag: '🇺🇸', bg: 'bg-blue-100', border: 'border-blue-300' },
      { id: 'uk', text: 'イギリス', english: 'U.K.', romaji: 'igirisu', flag: '🇬🇧', bg: 'bg-red-100', border: 'border-red-300' },
      { id: 'italy', text: 'イタリア', english: 'Italy', romaji: 'itaria', flag: '🇮🇹', bg: 'bg-green-100', border: 'border-green-300' },
      { id: 'india', text: 'インド', english: 'India', romaji: 'indo', flag: '🇮🇳', bg: 'bg-orange-100', border: 'border-orange-300' },
      { id: 'indonesia', text: 'インドネシア', english: 'Indonesia', romaji: 'indoneshia', flag: '🇮🇩', bg: 'bg-rose-100', border: 'border-rose-300' },
      { id: 'egypt', text: 'エジプト', english: 'Egypt', romaji: 'ejiputo', flag: '🇪🇬', bg: 'bg-amber-100', border: 'border-amber-300' },
      { id: 'australia', text: 'オーストラリア', english: 'Australia', romaji: 'oosutoraria', flag: '🇦🇺', bg: 'bg-sky-100', border: 'border-sky-300' },
      { id: 'canada', text: 'カナダ', english: 'Canada', romaji: 'kanada', flag: '🇨🇦', bg: 'bg-red-100', border: 'border-red-300' },
      { id: 'cambodia', text: 'カンボジア', english: 'Cambodia', romaji: 'kanbojia', flag: '🇰🇭', bg: 'bg-indigo-100', border: 'border-indigo-300' },
      { id: 'korea', text: 'かんこく', english: 'South Korea', romaji: 'kankoku', flag: '🇰🇷', bg: 'bg-slate-100', border: 'border-slate-300' },
      { id: 'saudiarabia', text: 'サウジアラビア', english: 'Saudi Arabia', romaji: 'saujiarabia', flag: '🇸🇦', bg: 'bg-emerald-100', border: 'border-emerald-300' },
      { id: 'singapore', text: 'シンガポール', english: 'Singapore', romaji: 'shingapooru', flag: '🇸🇬', bg: 'bg-red-100', border: 'border-red-300' },
      { id: 'spain', text: 'スペイン', english: 'Spain', romaji: 'supein', flag: '🇪🇸', bg: 'bg-yellow-100', border: 'border-yellow-300' },
      { id: 'srilanka', text: 'スリランカ', english: 'Sri Lanka', romaji: 'suriranka', flag: '🇱🇰', bg: 'bg-emerald-100', border: 'border-emerald-300' },
      { id: 'thailand', text: 'タイ', english: 'Thailand', romaji: 'tai', flag: '🇹🇭', bg: 'bg-indigo-100', border: 'border-indigo-300' },
      { id: 'taiwan', text: 'たいわん', english: 'Taiwan', romaji: 'taiwan', flag: '🇹🇼', bg: 'bg-blue-100', border: 'border-blue-300' },
      { id: 'china', text: 'ちゅうごく', english: 'China', romaji: 'chuugoku', flag: '🇨🇳', bg: 'bg-red-100', border: 'border-red-300' },
      { id: 'germany', text: 'ドイツ', english: 'Germany', romaji: 'doitsu', flag: '🇩🇪', bg: 'bg-amber-100', border: 'border-amber-300' },
      { id: 'turkey', text: 'トルコ', english: 'Turkey', romaji: 'toruko', flag: '🇹🇷', bg: 'bg-red-100', border: 'border-red-300' },
      { id: 'japan', text: 'にほん', english: 'Japan', romaji: 'nihon', flag: '🇯🇵', bg: 'bg-rose-100', border: 'border-rose-300' },
      { id: 'nz', text: 'ニュージーランド', english: 'New Zealand', romaji: 'nyuujiirando', flag: '🇳🇿', bg: 'bg-blue-100', border: 'border-blue-300' },
      { id: 'nepal', text: 'ネパール', english: 'Nepal', romaji: 'nepaaru', flag: '🇳🇵', bg: 'bg-sky-100', border: 'border-sky-300' },
      { id: 'hungary', text: 'ハンガリー', english: 'Hungary', romaji: 'hangarii', flag: '🇭🇺', bg: 'bg-green-100', border: 'border-green-300' },
      { id: 'philippines', text: 'フィリピン', english: 'Philippines', romaji: 'firipin', flag: '🇵🇭', bg: 'bg-sky-100', border: 'border-sky-300' },
      { id: 'brazil', text: 'ブラジル', english: 'Brazil', romaji: 'burajiru', flag: '🇧🇷', bg: 'bg-lime-100', border: 'border-lime-300' },
      { id: 'france', text: 'フランス', english: 'France', romaji: 'furansu', flag: '🇫🇷', bg: 'bg-blue-100', border: 'border-blue-300' },
      { id: 'peru', text: 'ペルー', english: 'Peru', romaji: 'peruu', flag: '🇵🇪', bg: 'bg-rose-100', border: 'border-rose-300' },
      { id: 'vietnam', text: 'ベトナム', english: 'Vietnam', romaji: 'betonamu', flag: '🇻🇳', bg: 'bg-red-100', border: 'border-red-300' },
      { id: 'malaysia', text: 'マレーシア', english: 'Malaysia', romaji: 'mareeshia', flag: '🇲🇾', bg: 'bg-yellow-100', border: 'border-yellow-300' },
      { id: 'myanmar', text: 'ミャンマー', english: 'Myanmar', romaji: 'myanmaa', flag: '🇲🇲', bg: 'bg-yellow-100', border: 'border-yellow-300' },
      { id: 'mexico', text: 'メキシコ', english: 'Mexico', romaji: 'mekishiko', flag: '🇲🇽', bg: 'bg-green-100', border: 'border-green-300' },
      { id: 'mongolia', text: 'モンゴル', english: 'Mongolia', romaji: 'mongoru', flag: '🇲🇳', bg: 'bg-blue-100', border: 'border-blue-300' },
      { id: 'russia', text: 'ロシア', english: 'Russia', romaji: 'roshia', flag: '🇷🇺', bg: 'bg-blue-100', border: 'border-blue-300' }
    ];

    // --- 効果音 ---
    const playSE = (audioCtx, type) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'incorrect') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      }
      osc.connect(gain);
      gain.connect(audioCtx.destination);
    };

    // --- 音声合成 (TTS) ---
    const speak = (text) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ja-JP';
        msg.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const googleJaVoice = voices.find(v => v.lang.includes('ja') && v.name.toLowerCase().includes('google'));
        if (googleJaVoice) msg.voice = googleJaVoice;
        window.speechSynthesis.speak(msg);
      }
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    function CountryKarutaApp() {
      const [gameState, setGameState] = useState('title'); // 'title', 'study', 'playing', 'result'
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(60);
      
      const [cards, setCards] = useState([]);
      const [targetId, setTargetId] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [wrongCardId, setWrongCardId] = useState(null);

      const audioCtxRef = useRef(null);
      const bagRef = useRef([]); // ランダム出題用のバッグ

      // 初回TTS初期化
      useEffect(() => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
      }, []);

      const initAudio = () => {
        if (!audioCtxRef.current) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtxRef.current = new AudioContext();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      const startStudy = () => {
        initAudio();
        setGameState('study');
      };

      const generateTurn = useCallback(() => {
        // バッグが空になったら、全カードをシャッフルして補充
        if (bagRef.current.length === 0) {
          bagRef.current = shuffleArray(COUNTRIES);
        }
        
        // バッグからターゲット（正解）を1枚取り出す
        const target = bagRef.current.pop();
        
        // ターゲット以外のカードからダミーを5枚選ぶ
        const remainingCards = COUNTRIES.filter(g => g.id !== target.id);
        const shuffledRemaining = shuffleArray(remainingCards);
        const dummies = shuffledRemaining.slice(0, 5);
        
        // ターゲットとダミーを合わせてシャッフルし、画面に表示する6枚にする
        const selectedCards = shuffleArray([target, ...dummies]);
        
        setCards(selectedCards);
        setTargetId(target.id);
        setShowAnswer(false);
        setWrongCardId(null);
        
        // ターゲットの音声を再生
        setTimeout(() => {
          speak(target.text);
        }, 300);
      }, []);

      const startGame = () => {
        initAudio();
        setScore(0);
        setTimeLeft(60);
        bagRef.current = []; // ゲーム開始時にバッグをリセット
        setGameState('playing');
        generateTurn();
      };

      // タイマー処理
      useEffect(() => {
        let timer;
        if (gameState === 'playing') {
          timer = setInterval(() => {
            setTimeLeft(prev => {
              if (prev <= 1) {
                setGameState('result');
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(timer);
      }, [gameState]);

      const handleCardClick = (card) => {
        if (showAnswer || gameState !== 'playing') return;

        if (card.id === targetId) {
          // 正解
          playSE(audioCtxRef.current, 'correct');
          setScore(s => s + 10);
          setShowAnswer(true);
          
          // 1.5秒後に次のターンへ
          setTimeout(() => {
            if (gameState === 'playing') {
              generateTurn();
            }
          }, 1500);
        } else {
          // 不正解
          playSE(audioCtxRef.current, 'incorrect');
          setScore(s => Math.max(0, s - 5));
          setWrongCardId(card.id);
          setTimeout(() => setWrongCardId(null), 500); // 震えるアニメーションをリセット
        }
      };

      const replayAudio = () => {
        const target = COUNTRIES.find(g => g.id === targetId);
        if (target) speak(target.text);
      };

      // --- Views ---

      const TitleScreen = () => (
        <div className="flex flex-col items-center justify-center h-full p-6 text-center animate-in fade-in duration-500">
          <div className="bg-white p-8 md:p-10 rounded-3xl shadow-2xl border-4 border-blue-200 max-w-lg w-full flex flex-col items-center">
            <div className="flex justify-center gap-4 mb-6">
              <Icon name="Globe" size={48} className="text-blue-500 animate-[spin_10s_linear_infinite]" />
              <Icon name="Map" size={48} className="text-green-500 animate-pulse" />
            </div>
            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-green-500 mb-4 tracking-tight">
              Country Karuta
            </h1>
            <p className="text-slate-600 font-medium mb-8">
              Learn countries and play the matching game!
            </p>
            
            <div className="flex flex-col sm:flex-row gap-4 w-full">
              <button 
                onClick={startStudy}
                className="flex-1 py-4 text-xl font-bold rounded-2xl bg-emerald-500 text-white hover:bg-emerald-400 transition-all transform hover:scale-105 active:scale-95 shadow-md flex flex-col items-center justify-center gap-1"
              >
                <Icon name="BookOpen" size={28} /> 
                <span>Study</span>
              </button>
              <button 
                onClick={startGame}
                className="flex-1 py-4 text-xl font-black rounded-2xl bg-blue-500 text-white hover:bg-blue-400 transition-all transform hover:scale-105 active:scale-95 shadow-md flex flex-col items-center justify-center gap-1"
              >
                <Icon name="Gamepad2" size={28} /> 
                <span>Play Game</span>
              </button>
            </div>
          </div>
        </div>
      );

      const StudyScreen = () => (
        <div className="flex flex-col h-full bg-slate-50 w-full max-w-5xl mx-auto animate-in fade-in duration-500">
          {/* ヘッダー */}
          <div className="flex justify-between items-center p-4 bg-white shadow-sm z-10 sticky top-0">
            <button 
              onClick={() => setGameState('title')}
              className="flex items-center gap-2 text-slate-500 hover:text-slate-800 font-bold transition active:scale-95"
            >
              <Icon name="ArrowLeft" size={24} /> Back to Title
            </button>
            <div className="font-bold text-emerald-600 flex items-center gap-2 bg-emerald-50 px-4 py-2 rounded-full">
              <Icon name="BookOpen" size={20} /> Study Mode
            </div>
          </div>

          {/* カード一覧 */}
          <div className="flex-1 p-4 md:p-6 overflow-y-auto">
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 content-start pb-10">
              {COUNTRIES.map(card => (
                <button
                  key={card.id}
                  onClick={() => speak(`${card.text}、${card.english}`)}
                  className={`flex flex-col items-center justify-center p-6 rounded-2xl border-4 shadow-sm hover:shadow-lg transition-all active:scale-95 aspect-square ${card.bg} ${card.border}`}
                >
                  <div className="text-6xl md:text-7xl mb-3 drop-shadow-sm">{card.flag}</div>
                  <div className="font-bold text-slate-800 text-lg md:text-xl kyokasho-font leading-tight mb-1">{card.text}</div>
                  <div className="font-bold text-slate-500 text-sm md:text-base mb-1">{card.romaji}</div>
                  <div className="font-semibold text-slate-400 text-xs md:text-sm">{card.english}</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );

      const GameScreen = () => {
        const targetCard = COUNTRIES.find(g => g.id === targetId);

        return (
          <div className="flex flex-col h-full bg-slate-50 w-full max-w-4xl mx-auto">
            {/* ヘッダー */}
            <div className="flex justify-between items-center p-4 bg-white shadow-sm z-10">
              <div className="flex items-center gap-2 bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-bold">
                <Icon name="Trophy" size={20} />
                <span>Score: {score}</span>
              </div>
              
              <button 
                onClick={replayAudio}
                className="flex items-center gap-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-600 px-6 py-3 rounded-full font-bold transition active:scale-95 shadow-sm"
              >
                <Icon name="Volume2" size={24} /> Listen Again
              </button>

              <div className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold ${timeLeft <= 10 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-slate-100 text-slate-600'}`}>
                <Icon name="Clock" size={20} />
                <span>{timeLeft}s</span>
              </div>
            </div>

            {/* カルタの場 */}
            <div className="flex-1 p-4 md:p-6 overflow-y-auto">
              <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 h-full content-start">
                {cards.map((card, index) => {
                  const isTarget = card.id === targetId;
                  const isWrong = card.id === wrongCardId;
                  
                  // 正解時のハイライト状態
                  const isRevealed = showAnswer && isTarget;
                  const isDimmed = showAnswer && !isTarget;

                  return (
                    <button
                      key={card.id}
                      onClick={() => handleCardClick(card)}
                      disabled={showAnswer}
                      className={`
                        relative flex flex-col items-center justify-center p-6 rounded-2xl border-4 shadow-md transition-all duration-300 aspect-square
                        ${isDimmed ? 'opacity-30 scale-95 grayscale' : 'opacity-100 hover:shadow-xl hover:-translate-y-1'}
                        ${isRevealed ? 'scale-105 z-10 border-blue-400 shadow-[0_0_30px_rgba(59,130,246,0.5)]' : card.bg + ' ' + card.border}
                        ${isWrong ? 'animate-[shake_0.2s_ease-in-out]' : ''}
                        active:scale-95
                      `}
                    >
                      {/* 授業用に選択肢のアルファベットを左肩に表示 */}
                      <div className="absolute top-2 left-3 md:top-3 md:left-4 text-xl md:text-2xl font-bold text-slate-500/50 font-sans pointer-events-none">
                        {['a', 'b', 'c', 'd', 'e', 'f'][index]}
                      </div>

                      {/* カードのイラスト（国旗） */}
                      <div className={`transition-all duration-300 ${isRevealed ? 'scale-75 -translate-y-6 opacity-50' : 'scale-100'}`}>
                        <div className="text-6xl md:text-7xl mb-2 drop-shadow-sm text-center">
                          {card.flag}
                        </div>
                        <div className="font-bold text-slate-600 text-sm md:text-base leading-tight text-center">
                          {card.english}
                        </div>
                      </div>

                      {/* 正解した時だけ浮かび上がる日本語（読み札の情報） */}
                      {isRevealed && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center p-2 animate-in zoom-in duration-300">
                          <span className="text-2xl md:text-3xl font-bold text-slate-800 kyokasho-font mb-1 leading-tight text-center">
                            {card.text}
                          </span>
                          <span className="text-lg md:text-xl font-bold text-slate-600 mb-1">
                            {card.romaji}
                          </span>
                        </div>
                      )}

                      {/* 不正解のバツ印 */}
                      {isWrong && (
                        <div className="absolute inset-0 flex items-center justify-center bg-red-500/20 rounded-xl">
                          <Icon name="X" size={80} className="text-red-500" />
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      const ResultScreen = () => (
        <div className="flex flex-col items-center justify-center h-full p-6 text-center animate-in zoom-in duration-500 w-full max-w-md mx-auto">
          <div className="bg-white p-10 rounded-3xl shadow-2xl border-4 border-blue-200 w-full flex flex-col items-center">
            <Icon name="Trophy" size={80} className="text-yellow-400 mb-6 drop-shadow-md" />
            <h2 className="text-4xl font-extrabold text-slate-800 mb-2">Time's Up!</h2>
            <p className="text-slate-500 mb-8">You successfully matched countries with flags!</p>
            
            <div className="bg-blue-50 w-full p-6 rounded-2xl border border-blue-100 mb-8">
              <div className="text-blue-500 font-bold uppercase tracking-widest text-sm mb-2">Final Score</div>
              <div className="text-6xl font-black text-blue-600">{score}</div>
            </div>

            <div className="flex flex-col gap-3 w-full">
              <button 
                onClick={startGame}
                className="w-full py-4 text-xl font-bold rounded-2xl bg-blue-500 text-white hover:bg-blue-400 transition-all transform active:scale-95 shadow-md flex items-center justify-center gap-2"
              >
                <Icon name="RotateCcw" size={24} /> Play Again
              </button>
              <button 
                onClick={() => setGameState('title')}
                className="w-full py-3 text-lg font-bold rounded-2xl bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all transform active:scale-95 flex items-center justify-center gap-2"
              >
                Back to Title
              </button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="h-screen bg-slate-100 font-sans overflow-hidden select-none touch-none">
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap');
            .kyokasho-font { font-family: 'Klee One', serif; }
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              25% { transform: translateX(-5px) rotate(-2deg); }
              75% { transform: translateX(5px) rotate(2deg); }
            }
          `}} />
          
          {gameState === 'title' && <TitleScreen />}
          {gameState === 'study' && <StudyScreen />}
          {gameState === 'playing' && <GameScreen />}
          {gameState === 'result' && <ResultScreen />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CountryKarutaApp />);
  </script>
</body>
</html>
