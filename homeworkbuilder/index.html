<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Word Quiz: 3-Step Mastery</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- Lucide Icon Component Helper ---
    const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
      const iconData = useMemo(() => {
        if (!window.lucide || !lucide.icons) return null;
        const key = name.charAt(0).toLowerCase() + name.slice(1);
        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
      }, [name]);

      if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill={fill}
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          dangerouslySetInnerHTML={{
            __html: iconData.map(([tag, attrs]) => {
              const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ");
              return `<${tag} ${attrStr} />`;
            }).join("")
          }}
        />
      );
    };

    // --- 柔軟な判定のためのローマ字変換・正規化ロジック ---
    const KANA_TO_ROMAJI = {
      'あ':'a', 'い':'i', 'う':'u', 'え':'e', 'お':'o',
      'か':'ka', 'き':'ki', 'く':'ku', 'け':'ke', 'こ':'ko',
      'さ':'sa', 'し':'shi', 'す':'su', 'せ':'se', 'そ':'so',
      'た':'ta', 'ち':'chi', 'つ':'tsu', 'て':'te', 'と':'to',
      'な':'na', 'に':'ni', 'ぬ':'nu', 'ね':'ne', 'の':'no',
      'は':'ha', 'ひ':'hi', 'ふ':'fu', 'へ':'he', 'ほ':'ho',
      'ま':'ma', 'み':'mi', 'む':'mu', 'め':'me', 'も':'mo',
      'や':'ya', 'ゆ':'yu', 'よ':'yo',
      'ら':'ra', 'り':'ri', 'る':'ru', 'れ':'re', 'ろ':'ro',
      'わ':'wa', 'を':'o', 'ん':'n',
      'が':'ga', 'ぎ':'gi', 'ぐ':'gu', 'げ':'ge', 'ご':'go',
      'ざ':'za', 'じ':'ji', 'ず':'zu', 'ぜ':'ze', 'ぞ':'zo',
      'だ':'da', 'ぢ':'ji', 'づ':'zu', 'で':'de', 'ど':'do',
      'ば':'ba', 'び':'bi', 'ぶ':'bu', 'べ':'be', 'ぼ':'bo',
      'ぱ':'pa', 'ぴ':'pi', 'ぷ':'pu', 'ぺ':'pe', 'ぽ':'po',
      'きゃ':'kya', 'きゅ':'kyu', 'きょ':'kyo',
      'しゃ':'sha', 'しゅ':'shu', 'しょ':'sho',
      'ちゃ':'cha', 'ちゅ':'chu', 'ちょ':'cho',
      'にゃ':'nya', 'にゅ':'nyu', 'にょ':'nyo',
      'ひゃ':'hya', 'ひゅ':'hyu', 'ひょ':'hyo',
      'みゃ':'mya', 'みゅ':'myu', 'みょ':'myo',
      'りゃ':'rya', 'りゅ':'ryu', 'りょ':'ryo',
      'ぎゃ':'gya', 'ぎゅ':'gyu', 'ぎょ':'gyo',
      'じゃ':'ja', 'じゅ':'ju', 'じょ':'jo',
      'びゃ':'bya', 'びゅ':'byu', 'びょ':'byo',
      'ぴゃ':'pya', 'ぴゅ':'pyu', 'ぴょ':'pyo'
    };

    // どんな入力（ひらがな・全角英数）でも一旦半角ローマ字に変換する
    const toRomaji = (text) => {
      let str = text.toLowerCase().replace(/\s+/g, '');
      str = str.replace(/[Ａ-Ｚａ-ｚ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));

      let romaji = '';
      let i = 0;
      while (i < str.length) {
        if (i < str.length - 1) {
          const twoChar = str.substring(i, i + 2);
          if (KANA_TO_ROMAJI[twoChar]) {
            romaji += KANA_TO_ROMAJI[twoChar];
            i += 2;
            continue;
          }
        }
        // 促音（っ）の処理
        if (str[i] === 'っ' && i < str.length - 1) {
          const nextChar = str.substring(i + 1, i + 2);
          const nextTwoChar = str.substring(i + 1, i + 3);
          let nextRomaji = KANA_TO_ROMAJI[nextTwoChar] || KANA_TO_ROMAJI[nextChar] || nextChar;
          if (nextRomaji && !['a', 'i', 'u', 'e', 'o'].includes(nextRomaji[0])) {
            romaji += nextRomaji[0];
            i++;
            continue;
          }
        }
        // 長音（ー）の処理
        if (str[i] === 'ー') {
          romaji += '-';
          i++;
          continue;
        }
        const oneChar = str[i];
        romaji += KANA_TO_ROMAJI[oneChar] || oneChar;
        i++;
      }
      return romaji;
    };

    // 綴りの揺らぎ（ヘボン式・訓令式・長音など）を吸収する正規化
    const normalizeRomaji = (romaji) => {
      return romaji
        .replace(/shi/g, 'si').replace(/chi/g, 'ti').replace(/tsu/g, 'tu').replace(/fu/g, 'hu').replace(/ji/g, 'zi')
        .replace(/sha/g, 'sya').replace(/shu/g, 'syu').replace(/sho/g, 'syo')
        .replace(/cha/g, 'tya').replace(/chu/g, 'tyu').replace(/cho/g, 'tyo')
        .replace(/ja/g, 'zya').replace(/ju/g, 'zyu').replace(/jo/g, 'zyo')
        .replace(/ou/g, 'o').replace(/oo/g, 'o').replace(/oh/g, 'o') // 長い「お」の揺らぎ吸収
        .replace(/uu/g, 'u') // 長い「う」の揺らぎ吸収
        .replace(/-/g, '') // ハイフン無視
        .replace(/nn/g, 'n'); // 「ん」のタイピング揺らぎ吸収
    };

    const normalizeString = (str) => str.toLowerCase().replace(/\s+/g, '');

    // --- 音声合成 (TTS) ---
    const speak = (text, onEndCallback) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ja-JP';
        msg.rate = 0.9;
        
        if (onEndCallback) {
          msg.onend = onEndCallback;
          msg.onerror = onEndCallback;
        }

        const voices = window.speechSynthesis.getVoices();
        const googleJaVoice = voices.find(v => v.lang.includes('ja') && v.name.toLowerCase().includes('google'));
        if (googleJaVoice) msg.voice = googleJaVoice;
        window.speechSynthesis.speak(msg);
      } else {
        if (onEndCallback) setTimeout(onEndCallback, 1500);
      }
    };

    // --- 効果音 ---
    const playSE = (audioCtx, type) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'incorrect') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      }
      osc.connect(gain);
      gain.connect(audioCtx.destination);
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    function App() {
      // 状態: 'setup', 'transition', 'step1', 'step2', 'step3', 'result'
      const [gameState, setGameState] = useState('setup'); 
      const [currentStep, setCurrentStep] = useState(1);
      const [userName, setUserName] = useState('');
      
      const [wordList, setWordList] = useState([
        { id: 1, word: '', meaning: '' },
        { id: 2, word: '', meaning: '' },
        { id: 3, word: '', meaning: '' },
        { id: 4, word: '', meaning: '' }
      ]);

      const [queue, setQueue] = useState([]); 
      const [options, setOptions] = useState([]); 
      const [feedback, setFeedback] = useState(null); 
      const [typeInput, setTypeInput] = useState(''); 

      const audioCtxRef = useRef(null);

      // 有効な単語のリスト
      const validWords = useMemo(() => {
        return wordList.filter(item => item.word.trim() !== '' && item.meaning.trim() !== '');
      }, [wordList]);

      useEffect(() => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
      }, []);

      const initAudio = () => {
        if (!audioCtxRef.current) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtxRef.current = new AudioContext();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      // --- Setup Logic ---
      const handleWordChange = (id, field, value) => {
        setWordList(prev => prev.map(item => {
          if (item.id === id) {
            return { ...item, [field]: value };
          }
          return item;
        }));
      };

      const addWordField = () => {
        setWordList(prev => [...prev, { id: Date.now(), word: '', meaning: '' }]);
      };

      const removeWordField = (id) => {
        setWordList(prev => prev.filter(item => item.id !== id));
      };

      const startGame = () => {
        initAudio();
        setCurrentStep(1);
        setGameState('transition');
      };

      const startCurrentStep = () => {
        initAudio();
        setQueue(shuffleArray(validWords));
        setFeedback(null);
        setTypeInput('');
        setGameState(`step${currentStep}`);
      };

      const finishStep = () => {
        if (currentStep === 1) {
          setCurrentStep(2);
          setGameState('transition');
        } else if (currentStep === 2) {
          setCurrentStep(3);
          setGameState('transition');
        } else {
          setGameState('result');
        }
      };

      // --- Step 1 & 2 Logic (Multiple Choice) ---
      const currentTargetId = queue.length > 0 ? queue[0].id : null;

      useEffect(() => {
        if ((gameState === 'step1' || gameState === 'step2') && currentTargetId && feedback === null) {
          const target = queue[0];
          const others = validWords.filter(item => item.id !== target.id);
          const shuffledOthers = shuffleArray(others);
          const dummies = shuffledOthers.slice(0, 3);
          setOptions(shuffleArray([target, ...dummies]));
          
          if (gameState === 'step1') {
            setTimeout(() => speak(target.word), 300);
          }
        }
      }, [gameState, currentTargetId, feedback, validWords]);

      const handleMultipleChoice = (selectedItem) => {
        if (feedback !== null || queue.length === 0) return;
        const target = queue[0];
        const isCorrect = selectedItem.id === target.id;

        if (isCorrect) {
          setFeedback('correct');
          playSE(audioCtxRef.current, 'correct');
          
          if (gameState === 'step2') {
             speak(target.word);
          }

          setTimeout(() => {
            setFeedback(null);
            const nextQueue = queue.slice(1);
            if (nextQueue.length === 0) {
               finishStep();
            } else {
               setQueue(nextQueue);
            }
          }, 1000);
        } else {
          setFeedback('incorrect');
          playSE(audioCtxRef.current, 'incorrect');
          setTimeout(() => {
            setFeedback(null);
            const newQueue = [...queue.slice(1), target];
            setQueue(newQueue);
          }, 1000);
        }
      };

      // --- Step 3 Logic (Typing) ---
      const handleTypingSubmit = (e) => {
        e?.preventDefault();
        if (feedback !== null || queue.length === 0 || typeInput.trim() === '') return;
        const target = queue[0];
        
        // 柔軟な判定ロジック
        // 1. 入力とターゲットを両方ローマ字に変換＆正規化して比較（ひらがな・ローマ字の相互判定、綴りの揺れ吸収）
        const inputNorm = normalizeRomaji(toRomaji(typeInput));
        const targetNorm = normalizeRomaji(toRomaji(target.word));
        
        // 2. 完全に一致するかどうか（漢字などで入力された場合のセーフティネット）
        const exactMatch = normalizeString(typeInput) === normalizeString(target.word);
        
        const isCorrect = inputNorm === targetNorm || exactMatch;

        if (isCorrect) {
          setFeedback('correct');
          playSE(audioCtxRef.current, 'correct');
          speak(target.word);
          setTimeout(() => {
            setFeedback(null);
            setTypeInput('');
            const nextQueue = queue.slice(1);
            if (nextQueue.length === 0) {
               finishStep();
            } else {
               setQueue(nextQueue);
            }
          }, 1000);
        } else {
          setFeedback('incorrect');
          playSE(audioCtxRef.current, 'incorrect');
          setTimeout(() => {
            setFeedback(null);
            setTypeInput('');
            const newQueue = [...queue.slice(1), target];
            setQueue(newQueue);
          }, 2500);
        }
      };

      // --- Report Download ---
      const downloadReport = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 1000;
        canvas.height = Math.max(600, 450 + validWords.length * 40);
        const ctx = canvas.getContext('2d');

        // 背景
        ctx.fillStyle = '#f8fafc'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ヘッダー背景
        ctx.fillStyle = '#0f766e'; 
        ctx.fillRect(0, 0, canvas.width, 180);

        // 枠線
        ctx.strokeStyle = '#14b8a6'; 
        ctx.lineWidth = 10;
        ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

        // タイトル
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 50px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Homework Report: Word Mastery', canvas.width / 2, 80);

        ctx.font = '30px sans-serif';
        ctx.fillText('3-Step Mastery Completed', canvas.width / 2, 130);

        // ユーザー名と日付
        ctx.fillStyle = '#334155'; 
        ctx.textAlign = 'left';
        ctx.font = 'bold 35px sans-serif';
        ctx.fillText(`Student: ${userName}`, 60, 250);
        
        const date = new Date().toLocaleString();
        ctx.fillStyle = '#64748b'; 
        ctx.font = '24px sans-serif';
        ctx.fillText(`Completed on: ${date}`, 60, 290);

        // 宣言文
        ctx.fillStyle = '#0f766e';
        ctx.font = 'bold 28px sans-serif';
        ctx.fillText('I hereby declare that I have mastered the following words:', 60, 360);

        // 単語リストの描画
        ctx.fillStyle = '#334155';
        ctx.font = '28px sans-serif';
        
        // 2列で描画
        const col1X = 80;
        const col2X = 520;
        let startY = 420;
        const rowHeight = 40;

        validWords.forEach((item, index) => {
          const text = `${index + 1}. ${item.word} = ${item.meaning}`;
          const x = (index % 2 === 0) ? col1X : col2X;
          const y = startY + Math.floor(index / 2) * rowHeight;
          ctx.fillText(text, x, y);
        });

        // ダウンロード
        const url = canvas.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = url;
        a.download = `${userName}_WordMasteryReport.png`;
        a.click();
      };

      // --- Views ---
      const renderSetupScreen = () => (
        <div className="flex flex-col items-center max-w-4xl mx-auto w-full p-4 sm:p-6 animate-in fade-in duration-500 h-full overflow-y-auto">
          <div className="text-center mb-8 mt-4">
            <div className="inline-flex items-center justify-center p-4 bg-teal-100 text-teal-600 rounded-full mb-4 shadow-sm">
              <Icon name="GraduationCap" size={40} />
            </div>
            <h1 className="text-3xl sm:text-4xl font-extrabold text-slate-800 mb-2 tracking-tight">Homework Builder</h1>
            <p className="text-slate-500 text-sm sm:text-base font-medium">Input the words you need to learn. Pass the 3-step test to get your report!</p>
          </div>

          <div className="w-full bg-white p-6 sm:p-8 rounded-3xl shadow-xl border border-slate-200 mb-8">
            <div className="mb-8">
              <label className="block text-slate-700 font-bold mb-2">Student Name:</label>
              <input 
                type="text" 
                placeholder="Enter your name" 
                value={userName}
                onChange={(e) => setUserName(e.target.value)}
                className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-teal-400 font-bold text-lg text-slate-700 transition"
              />
            </div>

            <div className="flex justify-between items-center mb-6">
              <h2 className="text-xl font-bold text-slate-700 flex items-center gap-2">
                <Icon name="List" size={24} className="text-teal-500" /> Word List
              </h2>
              <div className="flex items-center gap-3">
                <span className="text-sm font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-600">
                  {validWords.length} Words Ready
                </span>
              </div>
            </div>

            <div className="space-y-3 mb-6">
              {wordList.map((item, index) => (
                <div key={item.id} className="grid grid-cols-1 sm:grid-cols-12 gap-2 sm:gap-4 items-center bg-slate-50 p-4 rounded-xl border border-slate-200 relative group transition-all hover:border-teal-300">
                  <div className="absolute -left-2 -top-2 bg-slate-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-md z-10">
                    {index + 1}
                  </div>
                  
                  <div className="sm:col-span-5">
                    <label className="text-xs font-bold text-slate-400 mb-1 block sm:hidden">Word (Romaji, Hiragana, Kanji...)</label>
                    <input 
                      type="text" 
                      placeholder="e.g. ringo / りんご" 
                      value={item.word}
                      onChange={(e) => handleWordChange(item.id, 'word', e.target.value)}
                      className="w-full p-3 rounded-lg border border-slate-200 focus:outline-none focus:border-teal-400 kyokasho-font text-lg shadow-inner"
                    />
                  </div>
                  <div className="sm:col-span-6 relative">
                    <label className="text-xs font-bold text-slate-400 mb-1 block sm:hidden">Meaning (English, etc.)</label>
                    <input 
                      type="text" 
                      placeholder="e.g. apple" 
                      value={item.meaning}
                      onChange={(e) => handleWordChange(item.id, 'meaning', e.target.value)}
                      className="w-full p-3 rounded-lg border border-slate-200 focus:outline-none focus:border-teal-400 text-slate-600 shadow-inner"
                    />
                  </div>
                  <div className="sm:col-span-1 flex justify-end">
                    {wordList.length > 4 && (
                      <button 
                        onClick={() => removeWordField(item.id)}
                        className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                      >
                        <Icon name="Trash2" size={20} />
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>

            <button 
              onClick={addWordField}
              className="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 font-bold hover:bg-slate-50 hover:border-teal-400 hover:text-teal-600 transition flex items-center justify-center gap-2"
            >
              <Icon name="Plus" size={20} /> Add More Word Fields
            </button>
          </div>

          <div className="w-full bg-slate-800 p-6 rounded-3xl shadow-xl text-center sticky bottom-4 z-10 border-4 border-slate-700">
            <button 
              onClick={startGame}
              disabled={validWords.length < 4 || userName.trim() === ''}
              className={`w-full py-5 text-xl font-bold rounded-xl transition-all flex items-center justify-center gap-3 shadow-lg
                ${(validWords.length < 4 || userName.trim() === '')
                  ? 'bg-slate-600 text-slate-400 cursor-not-allowed' 
                  : 'bg-teal-500 text-white hover:bg-teal-400 active:scale-95 shadow-[0_0_20px_rgba(20,184,166,0.5)]'}`}
            >
              <Icon name="PlayCircle" size={28} /> Start 3-Step Mastery
            </button>
            {(validWords.length < 4 || userName.trim() === '') && (
              <p className="text-sm text-slate-400 mt-4 font-medium">
                * Please enter your name and at least 4 complete words to start.
              </p>
            )}
          </div>
        </div>
      );

      const renderTransitionScreen = () => {
        const stepInfo = {
          1: { title: "Step 1: Listening", icon: "Ear", desc: "Listen to the word and choose the correct meaning.", color: "text-blue-500" },
          2: { title: "Step 2: Reading", icon: "Eye", desc: "Look at the meaning and choose the correct word.", color: "text-purple-500" },
          3: { title: "Step 3: Typing", icon: "Keyboard", desc: "Look at the meaning and type the word.", color: "text-rose-500" }
        };
        const info = stepInfo[currentStep];

        return (
          <div className="flex flex-col items-center justify-center h-full p-6 text-center animate-in zoom-in duration-500 w-full max-w-2xl mx-auto">
            <div className="bg-white w-full rounded-3xl shadow-2xl border border-slate-100 p-10 flex flex-col items-center">
              <div className={`p-6 rounded-full bg-slate-50 mb-6 border-4 border-slate-100 ${info.color}`}>
                 <Icon name={info.icon} size={80} />
              </div>
              <h2 className={`text-4xl sm:text-5xl font-extrabold mb-4 ${info.color}`}>{info.title}</h2>
              <p className="text-xl text-slate-500 font-bold mb-10">{info.desc}</p>
              
              <div className="bg-slate-100 text-slate-600 px-6 py-3 rounded-full font-bold mb-8 flex items-center gap-2">
                 <Icon name="Target" size={20} /> Goal: Answer all {validWords.length} words correctly!
              </div>

              <button 
                onClick={startCurrentStep}
                className="w-full py-5 text-2xl font-black rounded-xl bg-slate-800 text-white hover:bg-slate-700 transition-all transform active:scale-95 shadow-xl flex items-center justify-center gap-3"
              >
                Let's Go! <Icon name="ArrowRight" size={28} />
              </button>
            </div>
          </div>
        );
      };

      const renderStep12Screen = () => {
        const target = queue[0];
        if (!target) return null;

        const isStep1 = gameState === 'step1';

        return (
          <div className="flex flex-col items-center justify-center h-full max-w-3xl mx-auto w-full p-4 sm:p-6 animate-in fade-in duration-300">
            <div className="w-full flex justify-between items-center mb-6 px-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3">
                 <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold ${isStep1 ? 'bg-blue-500' : 'bg-purple-500'}`}>
                    {currentStep}
                 </div>
                 <span className="font-bold text-slate-700 text-lg hidden sm:block">
                   {isStep1 ? 'Listening' : 'Reading'}
                 </span>
              </div>
              <div className="flex items-center gap-3 font-bold bg-slate-100 px-4 py-2 rounded-full text-slate-600 border border-slate-200">
                <Icon name="ListTodo" size={20} /> {validWords.length - queue.length + 1} / {validWords.length}
              </div>
            </div>

            <div className={`bg-white w-full rounded-3xl shadow-2xl border-b-8 p-8 text-center relative overflow-hidden flex flex-col items-center min-h-[450px]
                 ${isStep1 ? 'border-blue-500' : 'border-purple-500'}`}>
              
              <p className="text-slate-400 font-bold tracking-widest uppercase mb-6 text-sm">
                {isStep1 ? 'What does this mean?' : 'Choose the correct word'}
              </p>
              
              <div className="flex-1 flex flex-col items-center justify-center w-full mb-8">
                {isStep1 ? (
                  <button 
                    onClick={() => speak(target.word)}
                    className="p-8 bg-blue-50 hover:bg-blue-100 rounded-full text-blue-500 transition active:scale-90 border-4 border-blue-200 shadow-inner group"
                  >
                    <Icon name="Volume2" size={80} className="group-hover:scale-110 transition-transform" />
                  </button>
                ) : (
                  <h2 className="text-4xl sm:text-6xl font-black text-slate-800 break-words leading-tight px-4 bg-slate-50 w-full py-12 rounded-3xl border border-slate-100 shadow-inner">
                    {target.meaning}
                  </h2>
                )}
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full mt-auto">
                {options.map((opt, index) => {
                  const isSelected = feedback !== null;
                  const isTarget = opt.id === target.id;
                  
                  let btnClass = "bg-white border-2 border-slate-200 text-slate-700 hover:border-slate-400 hover:bg-slate-50";
                  if (isSelected) {
                    if (isTarget) btnClass = "bg-green-100 border-2 border-green-500 text-green-700 z-10 shadow-lg";
                    else btnClass = "bg-slate-50 border-2 border-slate-200 text-slate-300 opacity-50";
                  }

                  const displayValue = isStep1 ? opt.meaning : opt.word;

                  return (
                    <button
                      key={opt.id}
                      onClick={() => handleMultipleChoice(opt)}
                      disabled={isSelected}
                      className={`relative py-6 px-4 rounded-2xl font-bold text-2xl sm:text-3xl shadow-sm transition transform active:scale-95 flex items-center justify-center break-words kyokasho-font
                        ${btnClass}`}
                    >
                      <div className="absolute top-2 left-3 text-sm font-bold text-slate-400 font-sans opacity-50">
                        {['A', 'B', 'C', 'D'][index]}
                      </div>
                      {displayValue}
                    </button>
                  );
                })}
              </div>

              {feedback === 'correct' && (
                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none animate-in zoom-in duration-300 bg-white/50 backdrop-blur-sm">
                  <Icon name="CheckCircle" size={160} className="text-green-500 drop-shadow-2xl bg-white rounded-full" />
                </div>
              )}
              {feedback === 'incorrect' && (
                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none animate-in zoom-in duration-300 bg-white/50 backdrop-blur-sm">
                  <Icon name="XCircle" size={160} className="text-red-500 drop-shadow-2xl bg-white rounded-full" />
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderStep3Screen = () => {
        const target = queue[0];
        if (!target) return null;

        return (
          <div className="flex flex-col items-center justify-center h-full max-w-3xl mx-auto w-full p-4 sm:p-6 animate-in fade-in duration-300">
            <div className="w-full flex justify-between items-center mb-6 px-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3">
                 <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold bg-rose-500">3</div>
                 <span className="font-bold text-slate-700 text-lg hidden sm:block">Typing</span>
              </div>
              <div className="flex items-center gap-3 font-bold bg-slate-100 px-4 py-2 rounded-full text-slate-600 border border-slate-200">
                <Icon name="ListTodo" size={20} /> {validWords.length - queue.length + 1} / {validWords.length}
              </div>
            </div>

            <div className={`bg-white w-full rounded-3xl shadow-2xl border-b-8 border-rose-500 p-6 sm:p-10 text-center relative overflow-hidden flex flex-col items-center min-h-[450px]`}>
              
              <p className="text-slate-400 font-bold tracking-widest uppercase mb-6 text-sm">
                Type the Word (Romaji or Hiragana)
              </p>
              
              <div className="w-full bg-slate-50 border border-slate-100 rounded-3xl py-10 px-4 mb-8 shadow-inner flex flex-col items-center justify-center flex-1">
                <h2 className="text-4xl sm:text-5xl font-black text-slate-800 break-words mb-2">
                  {target.meaning}
                </h2>
              </div>

              <form onSubmit={handleTypingSubmit} className="w-full max-w-md mx-auto">
                <input 
                   type="text"
                   autoFocus
                   disabled={feedback !== null}
                   placeholder="Type here..."
                   value={typeInput}
                   onChange={(e) => setTypeInput(e.target.value)}
                   className={`w-full text-center text-3xl kyokasho-font p-6 bg-slate-100 border-4 rounded-2xl focus:outline-none transition-all shadow-inner
                     ${feedback === null ? 'border-slate-300 focus:border-rose-400 text-slate-800' : 
                       feedback === 'correct' ? 'border-green-500 text-green-700 bg-green-50' : 'border-red-500 text-red-700 bg-red-50'}`}
                />
                
                <button 
                  type="submit"
                  disabled={feedback !== null || typeInput.trim() === ''}
                  className="w-full mt-4 py-4 text-xl font-bold rounded-xl bg-slate-800 text-white hover:bg-slate-700 transition-all transform active:scale-95 disabled:opacity-50 disabled:active:scale-100 shadow-lg flex items-center justify-center gap-2"
                >
                  <Icon name="Send" size={24} /> Submit Answer
                </button>
              </form>

              {feedback === 'incorrect' && (
                <div className="absolute top-[60%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-11/12 bg-white border-4 border-red-500 p-6 rounded-3xl shadow-2xl z-30 animate-in zoom-in spin-in-2 flex flex-col items-center">
                  <Icon name="XCircle" size={60} className="text-red-500 mb-2" />
                  <p className="text-slate-500 font-bold uppercase tracking-widest text-sm mb-1">Correct Answer</p>
                  <p className="text-4xl font-black text-slate-800 kyokasho-font">{target.word}</p>
                </div>
              )}
              
              {feedback === 'correct' && (
                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none animate-in zoom-in duration-300 bg-white/50 backdrop-blur-sm">
                  <Icon name="CheckCircle" size={160} className="text-green-500 drop-shadow-2xl bg-white rounded-full" />
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderResultScreen = () => {
        return (
          <div className="flex flex-col items-center justify-center h-full max-w-2xl mx-auto w-full p-4 sm:p-6 animate-in zoom-in duration-500">
            <div className="bg-white w-full rounded-3xl shadow-2xl border-b-8 border-teal-500 p-8 sm:p-12 text-center">
              
              <div className="relative inline-block mb-6">
                <Icon name="Award" size={100} className="text-yellow-400 drop-shadow-xl animate-pulse" />
                <Icon name="Sparkles" size={40} className="text-yellow-500 absolute -top-2 -right-2 animate-bounce" />
              </div>
              
              <h2 className="text-4xl md:text-5xl font-black text-slate-800 mb-2 tracking-tight">Mastery Achieved!</h2>
              <p className="text-lg md:text-xl text-slate-500 font-bold mb-8">
                Outstanding work, <span className="text-teal-600">{userName}</span>!
              </p>
              
              <div className="bg-teal-50 border-2 border-teal-100 rounded-2xl p-6 mb-10 shadow-inner">
                <p className="text-teal-600 font-bold tracking-widest uppercase text-sm mb-4">Mastered Words</p>
                <div className="flex items-center justify-center gap-4">
                  <span className="text-7xl font-black text-teal-500">{validWords.length}</span>
                  <div className="text-left text-teal-600 font-bold leading-tight">
                    <div>Words</div>
                    <div>Completed</div>
                  </div>
                </div>
              </div>

              <div className="flex flex-col sm:flex-row gap-4">
                <button 
                  onClick={downloadReport}
                  className="flex-1 py-5 text-lg font-black rounded-xl bg-slate-800 text-white hover:bg-slate-700 transition-all transform active:scale-95 shadow-xl flex items-center justify-center gap-3"
                >
                  <Icon name="Download" size={24} /> Get Report
                </button>
                <button 
                  onClick={() => setGameState('setup')}
                  className="flex-1 py-5 text-lg font-bold rounded-xl bg-white border-4 border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-all transform active:scale-95 flex items-center justify-center gap-2"
                >
                  <Icon name="Home" size={24} /> Edit List
                </button>
              </div>

            </div>
          </div>
        );
      };

      return (
        <div className="h-screen bg-slate-100 font-sans overflow-hidden select-none touch-none flex flex-col">
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap');
            .kyokasho-font { font-family: 'Klee One', serif; }
          `}} />
          
          {gameState === 'setup' && renderSetupScreen()}
          {gameState === 'transition' && renderTransitionScreen()}
          {(gameState === 'step1' || gameState === 'step2') && renderStep12Screen()}
          {gameState === 'step3' && renderStep3Screen()}
          {gameState === 'result' && renderResultScreen()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
