<!DOCTYPE html>
            <html lang="ja">
            <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Dr. D's Nihiongo App</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
            <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
            <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
            <script src="https://unpkg.com/lucide@latest"></script>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
            <style>
            body {
                font-family: 'Inter', 'Noto Sans JP', sans-serif;
                background-color: #f8fafc;
                color: #0f172a;
                -webkit-font-smoothing: antialiased;
            }
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
            </style>
            </head>
            <body class="bg-slate-50 min-h-screen selection:bg-indigo-100 selection:text-indigo-900">
            <div id="root"></div>
            <script type="text/babel">
            const { useState, useMemo } = React;
            
            // --- [DATA_START] ---
            const INITIAL_LINKS = [
    {
        "id": "1775377374392utklonc1t0",
        "category": "Hiragana",
        "title": "balloon pop",
        "fileName": "balloon pop/index.html",
        "isFolder": true
    },
    {
        "id": "1775377502154al1mby0d10",
        "category": "Hiragana",
        "title": "voice shooter",
        "fileName": "voice shooter/index.html",
        "isFolder": true
    }
];
            const INITIAL_CATEGORY_ORDER = [
    "Hiragana"
];
            const INITIAL_PORTAL_TITLE = "Dr. D's Nihiongo App";
            // --- [DATA_END] ---
            
            const Icon = ({ name, size = 20, className = "" }) => {
                const iconData = useMemo(() => {
                        if (!window.lucide || !lucide.icons) return null;
                        const key = name.charAt(0).toLowerCase() + name.slice(1);
                        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
                }, [name]);
                if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;
                return (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: iconData.map(([tag, attrs]) => "<" + tag + " " + Object.entries(attrs).map(([k, v]) => k + '="' + v + '"').join(" ") + " />").join("")}} />
                );
            };
            
            function ViewerApp() {
                const [searchTerm, setSearchTerm] = useState("");
                const normalizedSearch = searchTerm.trim().toLowerCase();
                const hasLinks = INITIAL_LINKS.length > 0;
                
                const visibleSections = useMemo(() => {
                        const groupedLinks = INITIAL_LINKS.reduce((acc, link) => {
                                if (!acc[link.category]) acc[link.category] = [];
                                acc[link.category].push(link);
                                return acc;
                        }, {});
                        
                        let sortedCategories = INITIAL_CATEGORY_ORDER ? INITIAL_CATEGORY_ORDER.filter(cat => groupedLinks[cat]) : [];
                        const missingCategories = Object.keys(groupedLinks).filter(cat => !sortedCategories.includes(cat)).sort();
                        sortedCategories = [...sortedCategories, ...missingCategories];
                        
                        return sortedCategories
                            .map(category => {
                                    const items = groupedLinks[category].filter(link =>
                                        !normalizedSearch ||
                                        link.title.toLowerCase().includes(normalizedSearch) ||
                                        category.toLowerCase().includes(normalizedSearch)
                                    );
                                    return { category, items };
                            })
                            .filter(section => section.items.length > 0);
                }, [normalizedSearch]);
                
                return (
                    <div className="flex min-h-screen flex-col bg-slate-50">
                    <header className="sticky top-0 z-40 border-b border-slate-200/80 bg-white/95">
                    <div className="mx-auto flex max-w-6xl flex-col gap-4 px-5 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
                    <div className="flex min-w-0 items-center gap-3">
                    <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-indigo-600 text-white shadow-sm shadow-indigo-600/15">
                    <Icon name="Layers" size={18} />
                    </div>
                    <h1 className="truncate text-lg font-semibold tracking-tight text-slate-900 sm:text-xl">{INITIAL_PORTAL_TITLE}</h1>
                    </div>
                    
                    <div className="relative w-full lg:w-72">
                    <div className="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                    <Icon name="Search" size={16} />
                    </div>
                    <input
                    type="text"
                    placeholder="Search apps"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="block w-full rounded-2xl border border-slate-200 bg-slate-50 py-2.5 pl-10 pr-10 text-sm text-slate-700 placeholder-slate-400 outline-none transition duration-200 ease-out focus:border-indigo-300 focus:bg-white focus:ring-2 focus:ring-indigo-500/10"
                    />
                    {searchTerm ? (
                        <button
                        type="button"
                        onClick={() => setSearchTerm("")}
                        className="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 transition-colors duration-200 hover:text-slate-600"
                        aria-label="Clear search"
                        >
                        <Icon name="X" size={16} />
                        </button>
                    ) : null}
                    </div>
                    </div>
                    </header>
                    
                    <main className="flex-1">
                    <div className="mx-auto max-w-6xl px-5 py-8 sm:px-6 lg:px-8 lg:py-10">
                    {hasLinks ? (
                        visibleSections.length > 0 ? (
                            <div className="space-y-10">
                            {visibleSections.map(section => (
                                <section key={section.category} className="space-y-4">
                                <div className="flex items-center justify-between gap-3">
                                <h2 className="text-base font-semibold tracking-tight text-slate-800 sm:text-lg">{section.category}</h2>
                                <span className="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-500">
                                {section.items.length}
                                </span>
                                </div>
                                
                                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-3">
                                {section.items.map(link => {
                                    const isMp4 = link.fileName.endsWith(".mp4");
                                    const isFolder = link.isFolder || link.fileName.includes("/");
                                    return (
                                        <a
                                        key={link.id}
                                        href={"./" + link.fileName}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="group flex items-center gap-4 rounded-2xl border border-slate-200 bg-white px-4 py-4 shadow-sm shadow-slate-950/[0.03] transition duration-200 ease-out hover:-translate-y-0.5 hover:border-slate-300 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500/10"
                                        >
                                        <div className="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-slate-50 text-slate-500 transition duration-200 ease-out group-hover:bg-indigo-50 group-hover:text-indigo-600">
                                        <Icon name={isFolder ? "Folder" : (isMp4 ? "Video" : "FileText")} size={18} />
                                        </div>
                                        <div className="min-w-0 flex-1">
                                        <p className="truncate text-base font-medium text-slate-800 transition-colors duration-200 group-hover:text-slate-950">
                                        {link.title}
                                        </p>
                                        </div>
                                        <div className="shrink-0 text-slate-300 transition duration-200 ease-out group-hover:translate-x-0.5 group-hover:text-indigo-500">
                                        <Icon name="ChevronRight" size={18} />
                                        </div>
                                        </a>
                                    );
                                })}
                                </div>
                                </section>
                            ))}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center rounded-3xl border border-dashed border-slate-200 bg-white px-6 py-20 text-center">
                            <div className="flex h-14 w-14 items-center justify-center rounded-full bg-slate-100 text-slate-400">
                            <Icon name="SearchX" size={24} />
                            </div>
                            <h2 className="mt-5 text-lg font-medium text-slate-700">No results</h2>
                            <p className="mt-1 text-sm text-slate-400">Try another word.</p>
                            <button
                            type="button"
                            onClick={() => setSearchTerm("")}
                            className="mt-5 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-600 transition duration-200 ease-out hover:border-slate-300 hover:bg-slate-50"
                            >
                            Clear
                            </button>
                            </div>
                        )
                    ) : (
                        <div className="flex flex-col items-center justify-center rounded-3xl border border-dashed border-slate-200 bg-white px-6 py-20 text-center">
                        <div className="flex h-14 w-14 items-center justify-center rounded-full bg-slate-100 text-slate-400">
                        <Icon name="Inbox" size={24} />
                        </div>
                        <h2 className="mt-5 text-lg font-medium text-slate-700">No apps yet</h2>
                        <p className="mt-1 text-sm text-slate-400">Add files to create this portal.</p>
                        </div>
                    )}
                    </div>
                    </main>
                    
                    <footer className="border-t border-slate-200/80 bg-white/70">
                    <div className="mx-auto max-w-6xl px-5 py-5 text-center sm:px-6 lg:px-8">
                    <p className="text-xs font-medium uppercase tracking-[0.18em] text-slate-400">{INITIAL_PORTAL_TITLE}</p>
                    </div>
                    </footer>
                    </div>
                );
            }
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<ViewerApp />);
            </script>
            </body>
            </html>
