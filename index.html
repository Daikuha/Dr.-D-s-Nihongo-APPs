            const Icon = ({ name, size = 20, className = "" }) => {
                const iconData = useMemo(() => {
                        if (!window.lucide || !lucide.icons) return null;
                        const key = name.charAt(0).toLowerCase() + name.slice(1);
                        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
                }, [name]);
                if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;
                return (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: iconData.map(([tag, attrs]) => "<" + tag + " " + Object.entries(attrs).map(([k, v]) => k + '="' + v + '"').join(" ") + " />").join("")}} />
                );
            };
            
            function ViewerApp() {
                const [searchTerm, setSearchTerm] = useState("");
                const [isAboutOpen, setIsAboutOpen] = useState(false);
                const normalizedSearch = searchTerm.trim().toLowerCase();
                const aboutContent = INITIAL_ABOUT_CONTENT.trim();
                const hasLinks = INITIAL_LINKS.length > 0;
                
                const visibleSections = useMemo(() => {
                        const groupedLinks = INITIAL_LINKS.reduce((acc, link) => {

                                return acc;
                        }, {});
                        
                        let sortedCategories = INITIAL_CATEGORY_ORDER ? INITIAL_CATEGORY_ORDER.filter(cat => groupedLinks[cat]) : [];
                        const missingCategories = Object.keys(groupedLinks).filter(cat => !sortedCategories.includes(cat)).sort();
                        sortedCategories = [...sortedCategories, ...missingCategories];
                        
                        return sortedCategories
                            .map(category => {
                                    const items = groupedLinks[category].filter(link =>
                                        !normalizedSearch ||
                                        (link.title || "").toLowerCase().includes(normalizedSearch) ||
                                        (link.description || "").toLowerCase().includes(normalizedSearch) ||
                                        category.toLowerCase().includes(normalizedSearch)
                                    );
                                    return { category, items };
                            })
                            .filter(section => section.items.length > 0);
                }, [normalizedSearch]);
                
                const getCategoryMeta = (category) => INITIAL_CATEGORY_META && INITIAL_CATEGORY_META[category] ? INITIAL_CATEGORY_META[category] : {};
