            // Basic deterrent: prevent casual right-click saving/copying, link dragging, and common save/source shortcuts.
            document.addEventListener("contextmenu", (event) => event.preventDefault());
            document.addEventListener("dragstart", (event) => {
                    if (event.target && event.target.closest && event.target.closest("a, img, video")) {
                            event.preventDefault();
                    }
            });
            document.addEventListener("keydown", (event) => {
                    const key = event.key.toLowerCase();
                    const isSaveOrViewSource = (event.ctrlKey || event.metaKey) && (key === "s" || key === "u");
                    const isDevToolsShortcut = key === "f12" || ((event.ctrlKey || event.metaKey) && event.shiftKey && ["i", "j", "c"].includes(key)) || (event.metaKey && event.altKey && key === "u");
                    if (isSaveOrViewSource || isDevToolsShortcut) {
                            event.preventDefault();
                    }
            });
            
            const Icon = ({ name, size = 20, className = "" }) => {
                const iconData = useMemo(() => {
                        if (!window.lucide || !lucide.icons) return null;
                        const key = name.charAt(0).toLowerCase() + name.slice(1);
                        return lucide.icons[key] || lucide.icons[name] || lucide.icons[name.toLowerCase()];
                }, [name]);
                if (!iconData) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;
                return (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: iconData.map(([tag, attrs]) => "<" + tag + " " + Object.entries(attrs).map(([k, v]) => k + '="' + v + '"').join(" ") + " />").join("")}} />
                );

            function ViewerApp() {
                const [searchTerm, setSearchTerm] = useState("");
                const [isAboutOpen, setIsAboutOpen] = useState(false);
                const [activeLink, setActiveLink] = useState(null);
                const [developerTapCount, setDeveloperTapCount] = useState(0);
                const [lastDeveloperTapAt, setLastDeveloperTapAt] = useState(0);
                const [isDeveloperUnlockOpen, setIsDeveloperUnlockOpen] = useState(false);
                const [developerPasswordInput, setDeveloperPasswordInput] = useState("");
                const [developerUnlockError, setDeveloperUnlockError] = useState("");
                const [isDeveloperUnlocked, setIsDeveloperUnlocked] = useState(false);
                const accessStorageKey = "universal-index-access:" + INITIAL_PORTAL_TITLE;
                const [isAccessGranted, setIsAccessGranted] = useState(() => {
                        if (!INITIAL_ACCESS_CONTROL_ENABLED) return true;
                        const initialPassword = INITIAL_ACCESS_PASSWORD.trim();
                        if (!initialPassword) return true;
                        try {
                                return window.localStorage.getItem(accessStorageKey) === initialPassword;
                        } catch (error) {
                                return false;
                        }
                });
                const [passwordInput, setPasswordInput] = useState("");
                const [passwordError, setPasswordError] = useState("");
                const [hasReadRules, setHasReadRules] = useState(false);
                const normalizedSearch = searchTerm.trim().toLowerCase();
                const aboutContent = INITIAL_ABOUT_CONTENT.trim();
                const accessPassword = INITIAL_ACCESS_PASSWORD.trim();
                const needsAccessGate = INITIAL_ACCESS_CONTROL_ENABLED && Boolean(accessPassword);
                const hasLinks = INITIAL_LINKS.length > 0;
                const getCategoryMeta = (category) => INITIAL_CATEGORY_META && INITIAL_CATEGORY_META[category] ? INITIAL_CATEGORY_META[category] : {};
                const isDeveloperHiddenCategory = (category) => Boolean(getCategoryMeta(category).developerHidden);
                
                const categorizedSections = useMemo(() => {
                        const groupedLinks = INITIAL_LINKS.reduce((acc, link) => {
                                if (!acc[link.category]) acc[link.category] = [];
                                acc[link.category].push(link);
                                return acc;
                        }, {});
                        
                        let sortedCategories = INITIAL_CATEGORY_ORDER ? INITIAL_CATEGORY_ORDER.filter(cat => groupedLinks[cat]) : [];
                        const missingCategories = Object.keys(groupedLinks).filter(cat => !sortedCategories.includes(cat)).sort();
                        sortedCategories = [...sortedCategories, ...missingCategories];
                        
                        return sortedCategories
                            .map(category => ({
                                    category,
                                    items: groupedLinks[category],
                                    isDeveloperHidden: isDeveloperHiddenCategory(category)
                            }))
                            .filter(section => section.items.length > 0);
                }, []);
                const hasDeveloperHiddenCategories = categorizedSections.some(section => section.isDeveloperHidden);
                const hasAccessibleSections = categorizedSections.some(section => !section.isDeveloperHidden || isDeveloperUnlocked);
                const visibleSections = useMemo(() => categorizedSections
                    .filter(section => !section.isDeveloperHidden || isDeveloperUnlocked)
                    .map(section => {
                            const items = section.items.filter(link =>
                                !normalizedSearch ||
                                (link.title || "").toLowerCase().includes(normalizedSearch) ||
                                (link.description || "").toLowerCase().includes(normalizedSearch) ||
                                section.category.toLowerCase().includes(normalizedSearch)
                            );
                            return { category: section.category, items };
                    })
                    .filter(section => section.items.length > 0)
                , [categorizedSections, normalizedSearch, isDeveloperUnlocked]);
                
                const getCategoryTheme = (category) => {
                        const meta = getCategoryMeta(category);
                        return CATEGORY_THEME_OPTIONS.find(theme => theme.id === meta.color) || CATEGORY_THEME_OPTIONS[0];
                };
                const getCategoryIcon = (category) => getCategoryMeta(category).icon || "Layers";

                const grantAccess = () => {
                        if (needsAccessGate && passwordInput.trim() !== accessPassword) {
                                setPasswordError("Incorrect password. Please try again.");
                                return;
                        }
                        if (aboutContent && !hasReadRules) {
                                setPasswordError("Please review and agree to the About / Rules before entering.");
                                return;
                        }
                        try {
                                window.localStorage.setItem(accessStorageKey, accessPassword);
                        } catch (error) {
                                // Access still works for this session if localStorage is unavailable.
                        }
                        setPasswordError("");
                        setIsAccessGranted(true);
                };
                
                const closeDeveloperUnlock = () => {
                        setDeveloperTapCount(0);
                        setLastDeveloperTapAt(0);
                        setDeveloperPasswordInput("");
                        setDeveloperUnlockError("");
                        setIsDeveloperUnlockOpen(false);
                };
                
                const handleFooterTitleClick = () => {
                        if (!hasDeveloperHiddenCategories || isDeveloperUnlocked) return;
                        const now = Date.now();
                        const next = now - lastDeveloperTapAt > 1800 ? 1 : developerTapCount + 1;
                        setLastDeveloperTapAt(now);
                        if (next >= DEVELOPER_UNLOCK_TAP_COUNT) {
                                setDeveloperTapCount(0);
                                setLastDeveloperTapAt(0);
                                setDeveloperPasswordInput("");
                                setDeveloperUnlockError("");
                                setIsDeveloperUnlockOpen(true);
                                return;
                        }
                        setDeveloperTapCount(next);
                };
                
                const submitDeveloperUnlock = () => {
                        if (developerPasswordInput.trim() !== DEVELOPER_UNLOCK_PASSWORD) {
                                setDeveloperUnlockError("Incorrect developer password.");
                                return;
                        }
                        setDeveloperUnlockError("");
                        setDeveloperPasswordInput("");
                        setDeveloperTapCount(0);
                        setLastDeveloperTapAt(0);
                        setIsDeveloperUnlocked(true);
                        setIsDeveloperUnlockOpen(false);
                };
                
                const reinforceFrameProtection = (event) => {
                        try {
                                const frameDocument = event.currentTarget.contentWindow.document;
                                frameDocument.addEventListener("contextmenu", (frameEvent) => frameEvent.preventDefault());
                                frameDocument.addEventListener("dragstart", (frameEvent) => frameEvent.preventDefault());
                                frameDocument.addEventListener("keydown", (frameEvent) => {
                                        const key = frameEvent.key.toLowerCase();
                                        if ((frameEvent.ctrlKey || frameEvent.metaKey) && (key === "s" || key === "u")) {
                                                frameEvent.preventDefault();
                                        }
                                });
                        } catch (error) {
                                // Some browsers block iframe access; the parent-level deterrents still apply.
                        }
                };
                
                return (

                        <p className="mt-2 text-sm leading-7 text-slate-500">
                        Enter the password provided by your teacher or site administrator. Before continuing, please review the About / Rules.
                        </p>
                        <div className="mt-5">
                        <label className="block text-xs font-bold uppercase tracking-[0.18em] text-slate-400">

                        onChange={(event) => {
                                setPasswordInput(event.target.value);

                        }}
                        className="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base font-semibold text-slate-800 outline-none transition focus:border-indigo-300 focus:bg-white focus:ring-2 focus:ring-indigo-500/10"
                        placeholder="Enter password"
                        autoFocus
                        />
                        </div>
                        </div>
                        {aboutContent ? (
                            <div className="min-h-0 flex-1 overflow-y-auto border-y border-slate-100 bg-slate-50 px-6 py-5 sm:px-8">
                            <p className="whitespace-pre-wrap text-sm leading-7 text-slate-700">{aboutContent}</p>
                            </div>
                        ) : null}
                        <div className="px-6 py-5 sm:px-8">
                        {aboutContent ? (
                            <label className="flex items-start gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm leading-6 text-slate-600">
                            <input
                            type="checkbox"
                            checked={hasReadRules}
                            onChange={(event) => {
                                    setHasReadRules(event.target.checked);
                                    setPasswordError("");
                            }}
                            className="mt-1 h-4 w-4 rounded border-slate-300 text-indigo-600"

                        type="button"
                        onClick={() => setSearchTerm("")}
                        className="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 transition-colors duration-200 hover:text-slate-600"
                        aria-label="Clear search"
                        >
                        <Icon name="X" size={16} />
                        </button>
                    ) : null}
                    </div>
                    </div>
                    </div>
                    </header>
                    
                    {isAboutOpen ? (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 px-4 py-6">
                        <div className="w-full max-w-3xl overflow-hidden rounded-3xl bg-white shadow-2xl shadow-slate-950/20">
                        <div className="flex items-start justify-between gap-4 px-6 py-5">
                        <div>
                        <p className="text-xs font-bold uppercase tracking-[0.2em] text-indigo-500">About / Rules</p>
                        <h2 className="mt-1 text-xl font-semibold tracking-tight text-slate-900">About / Rules</h2>
                        </div>
                        <button
                        type="button"
                        onClick={() => setIsAboutOpen(false)}
                        className="rounded-full border border-slate-200 bg-white p-2 text-slate-400 transition hover:border-slate-300 hover:bg-slate-50 hover:text-slate-700"
                        aria-label="Close about dialog"
                        >
                        <Icon name="X" size={18} />
                        </button>
                        </div>
                        <div className="max-h-[68vh] overflow-y-auto border-t border-slate-100 px-6 py-6">
                        <p className="whitespace-pre-wrap text-sm leading-7 text-slate-700">{aboutContent}</p>
                        </div>
                        </div>
                        </div>
                    ) : null}
                    
                    {isDeveloperUnlockOpen ? (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/50 px-4 py-6">
                        <div className="w-full max-w-md overflow-hidden rounded-3xl bg-white shadow-2xl shadow-slate-950/20">
                        <div className="flex items-start justify-between gap-4 px-6 py-5">
                        <div>
                        <p className="text-xs font-bold uppercase tracking-[0.2em] text-amber-500">Developer Access</p>
                        <h2 className="mt-1 text-xl font-semibold tracking-tight text-slate-900">Unlock hidden categories</h2>
                        </div>
                        <button
                        type="button"
                        onClick={closeDeveloperUnlock}
                        className="rounded-full border border-slate-200 bg-white p-2 text-slate-400 transition hover:border-slate-300 hover:bg-slate-50 hover:text-slate-700"
                        aria-label="Close developer access dialog"
                        >
                        <Icon name="X" size={18} />
                        </button>
                        </div>
                        <div className="border-t border-slate-100 px-6 py-6">
                        <label className="block text-xs font-bold uppercase tracking-[0.18em] text-slate-400">
                        Developer password
                        </label>
                        <input
                        type="password"
                        value={developerPasswordInput}
                        onChange={(event) => {
                                setDeveloperPasswordInput(event.target.value);
                                setDeveloperUnlockError("");
                        }}
                        onKeyDown={(event) => {
                                if (event.key === "Enter") submitDeveloperUnlock();
                        }}
                        className="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base font-semibold text-slate-800 outline-none transition focus:border-amber-300 focus:bg-white focus:ring-2 focus:ring-amber-500/10"
                        placeholder="Enter developer password"
                        autoFocus
                        />
                        {developerUnlockError ? (
                            <p className="mt-3 text-sm font-semibold text-rose-600">{developerUnlockError}</p>
                        ) : null}
                        <div className="mt-5 flex flex-col-reverse gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <button
                        type="button"
                        onClick={closeDeveloperUnlock}
                        className="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-600 transition hover:border-slate-300 hover:bg-slate-50 hover:text-slate-900"
                        >
                        Cancel
                        </button>
                        <button
                        type="button"
                        onClick={submitDeveloperUnlock}
                        className="inline-flex items-center justify-center rounded-full bg-amber-500 px-5 py-2.5 text-sm font-bold text-white transition hover:bg-amber-600"
                        >
                        Unlock
                        </button>
                        </div>
                        </div>
                        </div>
                        </div>
                    ) : null}
                    
                    {activeLink ? (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 px-3 py-4 sm:px-6">
                        <div className="flex h-[92vh] w-full max-w-7xl flex-col overflow-hidden rounded-3xl bg-white shadow-2xl shadow-slate-950/25">
                        <div className="flex items-center justify-between gap-4 border-b border-slate-200 px-4 py-3 sm:px-5">
                        <div className="min-w-0">
                        <p className="text-xs font-bold uppercase tracking-[0.18em] text-indigo-500">Learning App</p>
                        <h2 className="truncate text-base font-semibold text-slate-900 sm:text-lg">{activeLinkTitle}</h2>
                        </div>
                        <button
                        type="button"
                        onClick={() => setActiveLink(null)}
                        className="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 transition hover:border-slate-300 hover:bg-slate-50 hover:text-slate-900"
                        aria-label="Close learning app"
                        >
                        <Icon name="X" size={16} />
                        Close
                        </button>
                        </div>
                        <div className="flex-1 bg-slate-100">
                        <iframe
                        key={activeLink.fileName}
                        src={activeLinkSrc}
                        title={activeLinkTitle}
                        className="h-full w-full border-0 bg-white"
                        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads allow-top-navigation-by-user-activation"
                        allow="fullscreen; autoplay; clipboard-read; clipboard-write"
                        onLoad={reinforceFrameProtection}
                        />
                        </div>
                        </div>
                        </div>
                    ) : null}
                    
                    <main className="flex-1">
                    <div className="mx-auto max-w-6xl px-5 py-8 sm:px-6 lg:px-8 lg:py-10">
                    {hasLinks ? (
                        hasAccessibleSections ? (
                            visibleSections.length > 0 ? (
                                <div className="space-y-10">
                                {visibleSections.map(section => {
                                    const theme = getCategoryTheme(section.category);
                                    const sectionIcon = getCategoryIcon(section.category);
                                    return (
                                    <section key={section.category} className="space-y-4">
                                    <div className="flex items-center justify-between gap-3">
                                    <div className="flex min-w-0 items-center gap-3">
                                    <span
                                    className="flex h-9 w-9 shrink-0 items-center justify-center rounded-2xl border"
                                    style={{ backgroundColor: theme.soft, borderColor: theme.border, color: theme.accent }}
                                    >
                                    <Icon name={sectionIcon} size={17} />
                                    </span>
                                    <h2 className="truncate text-base font-semibold tracking-tight sm:text-lg" style={{ color: theme.text }}>{section.category}</h2>
                                    </div>
                                    <span className="rounded-full border px-2.5 py-1 text-xs font-medium" style={{ backgroundColor: theme.soft, borderColor: theme.border, color: theme.text }}>
                                    {section.items.length}
                                    </span>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-3">
                                    {section.items.map(link => {
                                        const isMp4 = link.fileName.endsWith(".mp4");
                                        const isFolder = link.isFolder || link.fileName.includes("/");
                                        return (
                                            <button
                                            type="button"
                                            key={link.id}
                                            onClick={() => setActiveLink(link)}
                                            className="group flex w-full items-start gap-4 rounded-2xl border border-slate-200 bg-white px-4 py-4 text-left shadow-sm shadow-slate-950/[0.03] transition duration-200 ease-out hover:-translate-y-0.5 hover:border-slate-300 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500/10"
                                            style={{ backgroundColor: theme.surface, borderColor: theme.border }}
                                            >
                                            <div className="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl transition duration-200 ease-out" style={{ backgroundColor: theme.soft, color: theme.accent }}>
                                            <Icon name={isFolder ? "Folder" : (isMp4 ? "Video" : "FileText")} size={18} />
                                            </div>
                                            <div className="min-w-0 flex-1">
                                            <p className="truncate text-base font-medium text-slate-800 transition-colors duration-200 group-hover:text-slate-950">
                                            {link.title || link.fileName}
                                            </p>
                                            {link.description ? (
                                                <p className="mt-1 text-sm leading-relaxed text-slate-500">
                                                {link.description}
                                                </p>
                                            ) : null}
                                            </div>
                                            <div className="shrink-0 self-center text-slate-300 transition duration-200 ease-out group-hover:translate-x-0.5 group-hover:text-indigo-500">
                                            <Icon name="ChevronRight" size={18} />
                                            </div>
                                            </button>
                                        );
                                    })}
                                    </div>
                                    </section>
                                    );
                                })}
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center rounded-3xl border border-dashed border-slate-200 bg-white px-6 py-20 text-center">
                                <div className="flex h-14 w-14 items-center justify-center rounded-full bg-slate-100 text-slate-400">
                                <Icon name="SearchX" size={24} />
                                </div>
                                <h2 className="mt-5 text-lg font-medium text-slate-700">No results</h2>
                                <p className="mt-1 text-sm text-slate-400">Try another word.</p>
                                <button
                                type="button"
                                onClick={() => setSearchTerm("")}
                                className="mt-5 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-600 transition duration-200 ease-out hover:border-slate-300 hover:bg-slate-50"
                                >
                                Clear
                                </button>
                                </div>
                            )
                        ) : (
                            <div className="flex flex-col items-center justify-center rounded-3xl border border-dashed border-slate-200 bg-white px-6 py-20 text-center">
                            <div className="flex h-14 w-14 items-center justify-center rounded-full bg-slate-100 text-slate-400">
                            <Icon name="Lock" size={24} />
                            </div>
                            <h2 className="mt-5 text-lg font-medium text-slate-700">No apps available</h2>
                            <p className="mt-1 text-sm text-slate-400">There are no public categories available in this portal.</p>
                            </div>
                        )
                    ) : (
                        <div className="flex flex-col items-center justify-center rounded-3xl border border-dashed border-slate-200 bg-white px-6 py-20 text-center">
                        <div className="flex h-14 w-14 items-center justify-center rounded-full bg-slate-100 text-slate-400">
                        <Icon name="Inbox" size={24} />
                        </div>
                        <h2 className="mt-5 text-lg font-medium text-slate-700">No apps yet</h2>
                        <p className="mt-1 text-sm text-slate-400">Add files to create this portal.</p>
                        </div>
                    )}
                    </div>
                    </main>
                    
                    <footer className="border-t border-slate-200/80 bg-white/70">
                    <div className="mx-auto max-w-6xl px-5 py-5 text-center sm:px-6 lg:px-8">
                    <button
                    type="button"
                    onClick={handleFooterTitleClick}
                    disabled={!hasDeveloperHiddenCategories || isDeveloperUnlocked}
                    className={"text-xs font-medium uppercase tracking-[0.18em] transition " + (hasDeveloperHiddenCategories && !isDeveloperUnlocked ? "cursor-pointer text-slate-400 hover:text-slate-500" : "cursor-default text-slate-400")}
                    >
                    {INITIAL_PORTAL_TITLE}
                    </button>
                    {isDeveloperUnlocked ? (
                        <p className="mt-2 text-[10px] font-semibold uppercase tracking-[0.2em] text-amber-500">Developer categories unlocked</p>
                    ) : null}
                    </div>
                    </footer>
                    </div>
                );
            }
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<ViewerApp />);
            </script>
            </body>
            </html>
